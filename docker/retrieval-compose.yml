# CodeStory retrieval sidecars (Qdrant + Zoekt).
# Pins must match docs/ops/retrieval-sidecars.md and crates/codestory-retrieval/src/config.rs.
#
# Start via:
#   node scripts/setup-retrieval-env.mjs
# or:
#   cargo run -p codestory-cli -- retrieval bootstrap

name: ${CODESTORY_SIDECAR_NAMESPACE:-codestory-retrieval}

services:
  qdrant:
    image: qdrant/qdrant:v1.12.5@sha256:05fecce7dce45d1254e0468bc037e8210e187fd56fa847688b012293d5f08aae
    container_name: ${CODESTORY_SIDECAR_NAMESPACE:-codestory}-qdrant
    restart: unless-stopped
    labels:
      dev.codestory.owner: ${CODESTORY_SIDECAR_OWNER:-codestory}
      dev.codestory.profile: ${CODESTORY_SIDECAR_PROFILE:-local}
      dev.codestory.namespace: ${CODESTORY_SIDECAR_NAMESPACE:-codestory}
      dev.codestory.project_id: ${CODESTORY_PROJECT_ID:-}
      dev.codestory.workspace_id: ${CODESTORY_WORKSPACE_ID:-}
      dev.codestory.artifact_scope_id: ${CODESTORY_ARTIFACT_SCOPE_ID:-}
      dev.codestory.project_identity_schema_version: ${CODESTORY_PROJECT_IDENTITY_SCHEMA_VERSION:-}
      dev.codestory.workspace_root: ${CODESTORY_WORKSPACE_ROOT:-}
    ports:
      - "127.0.0.1:${CODESTORY_QDRANT_HTTP_PORT:-6333}:6333"
      - "127.0.0.1:${CODESTORY_QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - type: bind
        source: ${CODESTORY_QDRANT_DATA_DIR:?set CODESTORY_QDRANT_DATA_DIR}
        target: /qdrant/storage

  # Zoekt webserver (mount index dir populated by `retrieval index`).
  zoekt:
    image: sourcegraph/zoekt-webserver:0.0.0-20250506123554-490422d1adb4@sha256:34c77a62bcafc41ce3ee193e44f42aa84690d9ec51b953e7efae4dfdfae80aff
    container_name: ${CODESTORY_SIDECAR_NAMESPACE:-codestory}-zoekt
    restart: unless-stopped
    labels:
      dev.codestory.owner: ${CODESTORY_SIDECAR_OWNER:-codestory}
      dev.codestory.profile: ${CODESTORY_SIDECAR_PROFILE:-local}
      dev.codestory.namespace: ${CODESTORY_SIDECAR_NAMESPACE:-codestory}
      dev.codestory.project_id: ${CODESTORY_PROJECT_ID:-}
      dev.codestory.workspace_id: ${CODESTORY_WORKSPACE_ID:-}
      dev.codestory.artifact_scope_id: ${CODESTORY_ARTIFACT_SCOPE_ID:-}
      dev.codestory.project_identity_schema_version: ${CODESTORY_PROJECT_IDENTITY_SCHEMA_VERSION:-}
      dev.codestory.workspace_root: ${CODESTORY_WORKSPACE_ROOT:-}
    ports:
      - "127.0.0.1:${CODESTORY_ZOEKT_PORT:-6070}:6070"
    volumes:
      - type: bind
        source: ${CODESTORY_ZOEKT_DATA_DIR:?set CODESTORY_ZOEKT_DATA_DIR}
        target: /data/index

  # BAAI/bge-base-en-v1.5 embeddings via llama.cpp OpenAI-compatible API (768-dim).
  # Model GGUF must exist under CODESTORY_EMBED_MODEL_DIR (see setup-retrieval-env.mjs).
  embed:
    image: ghcr.io/ggml-org/llama.cpp:server@sha256:f16ca66f3ba316b7a7a16003ddfa88d29c3404fbe86550da086736864c11574c
    container_name: ${CODESTORY_SIDECAR_NAMESPACE:-codestory}-embed
    restart: unless-stopped
    labels:
      dev.codestory.owner: ${CODESTORY_SIDECAR_OWNER:-codestory}
      dev.codestory.profile: ${CODESTORY_SIDECAR_PROFILE:-local}
      dev.codestory.namespace: ${CODESTORY_SIDECAR_NAMESPACE:-codestory}
      dev.codestory.project_id: ${CODESTORY_PROJECT_ID:-}
      dev.codestory.workspace_id: ${CODESTORY_WORKSPACE_ID:-}
      dev.codestory.artifact_scope_id: ${CODESTORY_ARTIFACT_SCOPE_ID:-}
      dev.codestory.project_identity_schema_version: ${CODESTORY_PROJECT_IDENTITY_SCHEMA_VERSION:-}
      dev.codestory.workspace_root: ${CODESTORY_WORKSPACE_ROOT:-}
    ports:
      - "127.0.0.1:${CODESTORY_EMBED_PORT:-8080}:8080"
    volumes:
      - type: bind
        source: ${CODESTORY_EMBED_MODEL_DIR:?set CODESTORY_EMBED_MODEL_DIR}
        target: /models
        read_only: true
    # CodeStory requests Vulkan through these llama.cpp env vars when CPU mode
    # is not explicitly allowed. Linux render-node access is added by a
    # generated compose override only when /dev/dri exists.
    environment:
      - LLAMA_ARG_DEVICE
      - LLAMA_ARG_N_GPU_LAYERS
    command:
      - --embeddings
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - -m
      - /models/bge-base-en-v1.5.Q8_0.gguf
      - -c
      - "512"
      - -b
      - "1024"
      - -ub
      - "1024"
      - -np
      - "6"
