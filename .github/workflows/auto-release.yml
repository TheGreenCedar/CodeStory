name: Auto Release

on:
  push:
    branches:
      - main
    paths:
      - crates/**
      - Cargo.lock
      - CHANGELOG.md
      - AGENTS.md
      - docs/contributors/testing-matrix.md
      - release-claims.json
      - benchmarks/release-evidence/**
      - scripts/codestory-release-*.mjs
      - scripts/tests/codestory-release-*.test.mjs
      - scripts/tests/fixtures/release-claims/**
      - .github/actionlint.yaml
      - .github/workflows/**
      - .github/scripts/**
      - package.json
      - package-lock.json
      - plugins/codestory/**

permissions:
  contents: read

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  workflow-policy:
    name: Workflow policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install workflow policy dependencies
        run: npm ci --ignore-scripts

      - name: Check workflow syntax
        run: node .github/scripts/run-actionlint.mjs

      - name: Check release claim and evidence contracts
        run: >-
          node --test
          scripts/tests/codestory-release-claims.test.mjs
          scripts/tests/codestory-release-evidence-gate.test.mjs

      - name: Enforce workflow policy
        run: |
          node .github/scripts/check-workflow-policy.mjs
          node --test .github/scripts/check-workflow-policy.test.mjs

  detect-version:
    name: Detect codestory-cli version change
    needs: workflow-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Compare codestory-cli versions
        id: version
        env:
          BEFORE_SHA: ${{ github.event.before }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python .github/scripts/detect-codestory-release.py \
            --before-sha "$BEFORE_SHA" \
            --repo "$GITHUB_REPOSITORY" \
            --output "$GITHUB_OUTPUT"

      - name: Validate synchronized release version
        if: steps.version.outputs.should_release == 'true'
        run: python .github/scripts/check-codestory-release.py --version "${{ steps.version.outputs.version }}"

  release:
    name: Release
    needs: detect-version
    if: needs.detect-version.outputs.should_release == 'true'
    permissions:
      actions: read
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      version: ${{ needs.detect-version.outputs.version }}
