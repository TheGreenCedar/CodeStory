name: Exact-head source proof

on:
  pull_request:
    types: [labeled]
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      proof_key:
        required: true
        type: string
      version:
        required: false
        default: ""
        type: string
      emit_release_cells:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      pr_number:
        description: Same-repository pull request accepted by exact-head review. Dispatch with --ref <same-repository PR head branch>.
        required: true
        type: string
      expected_head_sha:
        description: Exact reviewed head SHA. The selected --ref, github.sha, and live PR head must match.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: source-proof-${{ github.sha }}-${{ inputs.proof_key || inputs.pr_number || github.event.pull_request.number || github.ref }}-${{ github.event.action == 'labeled' && github.event.label.name || 'dispatch' }}
  cancel-in-progress: true

jobs:
  resolve:
    if: github.event_name != 'pull_request' || (github.event.action == 'labeled' && github.event.label.name == 'review-accepted')
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
    steps:
      - name: Resolve trusted exact head
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          CALLER_REF: ${{ inputs.ref }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          set -euo pipefail
          if [ -n "$EVENT_PR_NUMBER" ]; then
            test "$EVENT_HEAD_REPO" = "$GITHUB_REPOSITORY" || {
              echo "::error::Exact-head proof does not execute fork pull requests."
              exit 1
            }
            pr="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$EVENT_PR_NUMBER")"
            head_repo="$(jq -r '.head.repo.full_name' <<<"$pr")"
            current_head="$(jq -r '.head.sha' <<<"$pr")"
            test "$head_repo" = "$GITHUB_REPOSITORY" || {
              echo "::error::Exact-head proof does not execute fork pull requests."
              exit 1
            }
            test "$current_head" = "$EVENT_HEAD_SHA" || {
              echo "::error::PR #$EVENT_PR_NUMBER moved after the review-accepted label event."
              exit 1
            }
            echo "ref=$EVENT_HEAD_SHA" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -n "$PR_NUMBER" ]; then
            pr="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER")"
            head_repo="$(jq -r '.head.repo.full_name' <<<"$pr")"
            head_sha="$(jq -r '.head.sha' <<<"$pr")"
            head_ref="$(jq -r '.head.ref' <<<"$pr")"
            test "$head_repo" = "$GITHUB_REPOSITORY" || {
              echo "::error::Exact-head proof does not execute fork pull requests."
              exit 1
            }
            test "$head_sha" = "$EXPECTED_HEAD_SHA" || {
              echo "::error::PR #$PR_NUMBER moved from reviewed head $EXPECTED_HEAD_SHA to $head_sha."
              exit 1
            }
            test "$GITHUB_REF" = "refs/heads/$head_ref" || {
              echo "::error::Exact-head proof must be dispatched with --ref $head_ref (the same-repository PR head branch), not $GITHUB_REF."
              exit 1
            }
            test "$GITHUB_SHA" = "$EXPECTED_HEAD_SHA" || {
              echo "::error::Workflow SHA $GITHUB_SHA is not reviewed PR head $EXPECTED_HEAD_SHA. Dispatch with --ref $head_ref."
              exit 1
            }
            echo "ref=$head_sha" >> "$GITHUB_OUTPUT"
          else
            test -n "$CALLER_REF"
            test "$GITHUB_SHA" = "$CALLER_REF" || {
              echo "::error::Reusable source proof ref $CALLER_REF does not match workflow SHA $GITHUB_SHA."
              exit 1
            }
            echo "ref=$CALLER_REF" >> "$GITHUB_OUTPUT"
          fi

  full-source-gate:
    name: full-source-gate
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve.outputs.ref }}

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component clippy
          rustup default stable

      - name: Install Linux Vulkan build dependencies
        run: bash .github/scripts/install-linux-vulkan-build-deps.sh

      - name: Capture Rust cache identity
        id: rust-cache-key
        shell: bash
        run: |
          echo "version=$(rustc -Vv | sed -n 's/^release: //p')" >> "$GITHUB_OUTPUT"
          echo "target=$(rustc -Vv | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"

      - name: Restore Cargo inputs and output
        id: cargo-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-source-proof-v2-${{ needs.resolve.outputs.ref }}-${{ steps.rust-cache-key.outputs.version }}-${{ steps.rust-cache-key.outputs.target }}-workspace-all-targets-all-features-${{ hashFiles('Cargo.lock') }}

      - name: Test the complete workspace once
        run: cargo test --workspace --locked

      - name: Lint every workspace target and feature once
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Emit authenticated source release cell
        if: inputs.emit_release_cells
        shell: bash
        run: |
          set -euo pipefail
          node scripts/codestory-release-cell-manifest.mjs produce \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "${{ needs.resolve.outputs.ref }}" \
            --version "${{ inputs.version }}" \
            --cell-id source_behavior \
            --producer-workflow .github/workflows/source-proof.yml \
            --producer-job full-source-gate \
            --producer-run-id "$GITHUB_RUN_ID" \
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --producer-artifact "release-cell-prepublish-source-attempt-$GITHUB_RUN_ATTEMPT" \
            --out target/release-cells/source_behavior.json

      - name: Upload authenticated source release cell
        if: success() && inputs.emit_release_cells
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-cell-prepublish-source-attempt-${{ github.run_attempt }}
          path: target/release-cells/source_behavior.json
          if-no-files-found: error
          retention-days: 30

      - name: Save Cargo inputs and output
        if: success() && steps.cargo-cache-restore.outputs.cache-hit != 'true' && steps.cargo-cache-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache-restore.outputs.cache-primary-key }}
