# Retrieval smoke: Linux carries generic contracts; Windows keeps manifest-missing shape coverage.
# Contract: docs/ops/retrieval-sidecars.md#preflight-smoke-contract

name: retrieval-sidecar-smoke

on:
  pull_request:
    paths:
      - .codex/environments/**
      - .cursor/rules/**
      - .github/actions/**
      - .github/scripts/**
      - .github/workflows/**
      - benchmarks/**
      - crates/**
      - docs/architecture/language-support.md
      - docs/architecture/retrieval-*
      - docs/contributors/testing-matrix.md
      - docs/ops/retrieval-sidecars.md
      - docs/testing/codestory-e2e-stats-log.md
      - docs/testing/performance-review-playbook.md
      - docs/testing/retrieval-architecture.md
      - plugins/codestory/**
      - scripts/**
  # Base-branch runs seed caches that sibling PRs are allowed to restore.
  push:
    branches:
      - main
      - dev/codestory-next
    paths:
      - .codex/environments/**
      - .cursor/rules/**
      - .github/actions/**
      - .github/scripts/**
      - .github/workflows/**
      - benchmarks/**
      - crates/**
      - docs/architecture/language-support.md
      - docs/architecture/retrieval-*
      - docs/contributors/testing-matrix.md
      - docs/ops/retrieval-sidecars.md
      - docs/testing/codestory-e2e-stats-log.md
      - docs/testing/performance-review-playbook.md
      - docs/testing/retrieval-architecture.md
      - plugins/codestory/**
      - scripts/**
  workflow_dispatch:

concurrency:
  group: retrieval-sidecar-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Generalization lint (production paths)
        run: node scripts/lint-retrieval-generalization.mjs

      - name: Release evidence gate contracts
        run: node --test scripts/tests/codestory-release-evidence-gate.test.mjs

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture Rust cache key
        id: rust-cache-key
        shell: bash
        run: |
          echo "version=$(rustc -Vv | sed -n 's/^release: //p')" >> "$GITHUB_OUTPUT"
          echo "target=$(rustc -Vv | sed -n 's/^host: //p')" >> "$GITHUB_OUTPUT"

      - name: Restore Cargo registry, git sources, and build output
        id: cargo-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-${{ steps.rust-cache-key.outputs.target }}-retrieval-contracts-default-features-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-${{ steps.rust-cache-key.outputs.target }}-retrieval-contracts-default-features-

      - name: Generalization lint regression contracts
        run: cargo test --locked -p codestory-runtime --test retrieval_generalization_guard

      - name: Runtime sidecar and packet contract tests
        run: |
          cargo test --locked -p codestory-runtime --lib agent::retrieval_primary::tests
          cargo test --locked -p codestory-runtime --lib agent::packet_search::tests
          cargo test --locked -p codestory-runtime --lib agent::packet_claim_profiles::tests
          cargo test --locked -p codestory-runtime --lib search_rejects_natural_language_queries_without_full_sidecars
          cargo test --locked -p codestory-runtime --lib search_results_ignores_repo_text_hits_without_full_sidecars
          cargo test --locked -p codestory-runtime --lib repo_text_auto_fallback_is_not_product_search_without_full_sidecars

      - name: Stdio protocol contract tests
        run: cargo test --locked -p codestory-cli --test stdio_protocol_contracts

      - name: CLI search JSON fail-closed contract tests
        run: cargo test --locked -p codestory-cli --test search_json_output

      - name: Packet/search fixture and baseline contract tests
        run: cargo test --locked -p codestory-cli --test packet_search_eval

      - name: Retrieval crate unit tests
        run: cargo test --locked -p codestory-retrieval

      - name: Save Cargo registry, git sources, and build output
        if: always() && steps.cargo-cache-restore.outputs.cache-hit != 'true' && steps.cargo-cache-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache-restore.outputs.cache-primary-key }}

  windows-manifest-missing:
    if: github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture Rust cache key
        id: rust-cache-key
        run: |
          $release = rustc -Vv | Select-String '^release: ' | ForEach-Object { $_.ToString().Substring(9) }
          $target = rustc -Vv | Select-String '^host: ' | ForEach-Object { $_.ToString().Substring(6) }
          "version=$release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "target=$target" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore Cargo registry, git sources, and build output
        id: cargo-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-${{ steps.rust-cache-key.outputs.target }}-retrieval-bootstrap-default-features-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-${{ steps.rust-cache-key.outputs.target }}-retrieval-bootstrap-default-features-

      - name: Retrieval readiness manifest-missing contract
        run: cargo test --locked -p codestory-cli --test ready_command

      - name: Save Cargo registry, git sources, and build output
        if: always() && steps.cargo-cache-restore.outputs.cache-hit != 'true' && steps.cargo-cache-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache-restore.outputs.cache-primary-key }}
