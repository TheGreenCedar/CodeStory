# Retrieval smoke: Linux carries generic contracts; Windows keeps manifest-missing shape coverage.
# Contract: docs/ops/retrieval-sidecars.md#preflight-smoke-contract

name: retrieval-sidecar-smoke

on:
  pull_request:
    paths:
      - crates/codestory-retrieval/**
      - crates/codestory-contracts/**
      - crates/codestory-store/Cargo.toml
      - crates/codestory-store/src/**
      - crates/codestory-cli/src/retrieval.rs
      - crates/codestory-cli/src/main.rs
      - crates/codestory-cli/src/args.rs
      - crates/codestory-cli/src/runtime.rs
      - crates/codestory-cli/src/stdio_*.rs
      - crates/codestory-cli/tests/retrieval_bootstrap_contracts.rs
      - crates/codestory-cli/tests/search_json_output.rs
      - crates/codestory-cli/tests/stdio_protocol_contracts.rs
      - crates/codestory-runtime/src/**
      - crates/codestory-indexer/Cargo.toml
      - crates/codestory-indexer/src/lib.rs
      - scripts/lint-retrieval-generalization.mjs
      - scripts/**retrieval**
      - docs/ops/retrieval-sidecars.md
      - docs/architecture/retrieval-*.md
      - docs/testing/retrieval-architecture.md
      - docker/retrieval-compose.yml
      - .github/workflows/retrieval-sidecar-smoke.yml
  # Base-branch runs seed caches that sibling PRs are allowed to restore.
  push:
    branches:
      - main
      - dev/codestory-next
    paths:
      - crates/codestory-retrieval/**
      - crates/codestory-contracts/**
      - crates/codestory-store/Cargo.toml
      - crates/codestory-store/src/**
      - crates/codestory-cli/src/retrieval.rs
      - crates/codestory-cli/src/main.rs
      - crates/codestory-cli/src/args.rs
      - crates/codestory-cli/src/runtime.rs
      - crates/codestory-cli/src/stdio_*.rs
      - crates/codestory-cli/tests/retrieval_bootstrap_contracts.rs
      - crates/codestory-cli/tests/search_json_output.rs
      - crates/codestory-cli/tests/stdio_protocol_contracts.rs
      - crates/codestory-runtime/src/**
      - crates/codestory-indexer/Cargo.toml
      - crates/codestory-indexer/src/lib.rs
      - scripts/lint-retrieval-generalization.mjs
      - scripts/**retrieval**
      - docs/ops/retrieval-sidecars.md
      - docs/architecture/retrieval-*.md
      - docs/testing/retrieval-architecture.md
      - docker/retrieval-compose.yml
      - .github/workflows/retrieval-sidecar-smoke.yml
  workflow_dispatch:

concurrency:
  group: retrieval-sidecar-smoke-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  linux-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          package-manager-cache: false

      - name: Generalization lint (production paths)
        run: node scripts/lint-retrieval-generalization.mjs

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture Rust cache key
        id: rust-cache-key
        shell: bash
        run: |
          echo "version=$(rustc -Vv | sed -n 's/^release: //p')" >> "$GITHUB_OUTPUT"

      - name: Restore Cargo registry, git sources, and build output
        id: cargo-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-
            ${{ runner.os }}-cargo-stable-

      - name: Runtime sidecar and packet contract tests
        run: |
          cargo test -p codestory-runtime --lib agent::retrieval_primary::tests
          cargo test -p codestory-runtime --lib agent::packet_search::tests
          cargo test -p codestory-runtime --lib agent::packet_claim_profiles::tests
          cargo test -p codestory-runtime --lib search_rejects_natural_language_queries_without_full_sidecars
          cargo test -p codestory-runtime --lib search_results_ignores_repo_text_hits_without_full_sidecars
          cargo test -p codestory-runtime --lib repo_text_auto_fallback_is_not_product_search_without_full_sidecars

      - name: Stdio protocol contract tests
        run: cargo test -p codestory-cli --test stdio_protocol_contracts

      - name: CLI search JSON fail-closed contract tests
        run: cargo test -p codestory-cli --test search_json_output

      - name: Retrieval crate unit tests
        run: cargo test -p codestory-retrieval

      - name: Save Cargo registry, git sources, and build output
        if: always() && steps.cargo-cache-restore.outputs.cache-hit != 'true' && steps.cargo-cache-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache-restore.outputs.cache-primary-key }}

  windows-manifest-missing:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.labels.*.name, 'ci:windows-smoke')
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Capture Rust cache key
        id: rust-cache-key
        run: |
          $release = rustc -Vv | Select-String '^release: ' | ForEach-Object { $_.ToString().Substring(9) }
          "version=$release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore Cargo registry, git sources, and build output
        id: cargo-cache-restore
        uses: actions/cache/restore@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-stable-${{ steps.rust-cache-key.outputs.version }}-
            ${{ runner.os }}-cargo-stable-

      - name: Retrieval bootstrap manifest-missing contract
        run: cargo test -p codestory-cli --test retrieval_bootstrap_contracts

      - name: Save Cargo registry, git sources, and build output
        if: always() && steps.cargo-cache-restore.outputs.cache-hit != 'true' && steps.cargo-cache-restore.outputs.cache-primary-key != ''
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ steps.cargo-cache-restore.outputs.cache-primary-key }}
