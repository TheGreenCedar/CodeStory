name: Release

on:
  workflow_call:
    inputs:
      version:
        description: "Release version from crates/codestory-cli/Cargo.toml, for example 0.7.0"
        required: true
        type: string
      source_run_id:
        description: "Optional rejected release-evidence run to re-evaluate without measuring again"
        required: false
        type: string
        default: ""
      calibration_bundle_artifact:
        description: "Frozen calibration bundle artifact name"
        required: true
        type: string
      calibration_bundle_run_id:
        description: "Workflow run that produced the frozen calibration bundle artifact"
        required: true
        type: string
      expected_head_sha:
        description: "Optional exact head required by proof-only callers"
        required: false
        type: string
        default: ""
      publish_release:
        description: "Trusted caller authority to publish after pre-publish closeout"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      version:
        description: "Release version from crates/codestory-cli/Cargo.toml, for example 0.7.0"
        required: true
        type: string
      expected_head_sha:
        description: "Exact dev/codestory-next head to authenticate without publishing"
        required: true
        type: string
      source_run_id:
        description: "Optional rejected release-evidence run to re-evaluate without measuring again"
        required: false
        type: string
        default: ""
      calibration_bundle_artifact:
        description: "Frozen calibration bundle artifact name"
        required: true
        type: string
      calibration_bundle_run_id:
        description: "Workflow run that produced the frozen calibration bundle artifact"
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  workflow-policy:
    name: Workflow policy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install workflow policy dependencies
        run: npm ci --ignore-scripts

      - name: Check workflow syntax
        run: |
          node --test .github/scripts/run-actionlint.test.mjs
          node .github/scripts/run-actionlint.mjs

      - name: Check release claim and evidence contracts
        run: >-
          node --test
          scripts/tests/codestory-release-claims.test.mjs
          scripts/tests/codestory-release-cell-manifest.test.mjs
          scripts/tests/codestory-release-closeout.test.mjs
          scripts/tests/codestory-release-evidence-gate.test.mjs

      - name: Enforce workflow policy
        run: |
          node .github/scripts/check-workflow-policy.mjs
          node --test .github/scripts/check-workflow-policy.test.mjs

  preflight:
    name: Release preflight
    needs: workflow-policy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate release authority
        env:
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
          GH_TOKEN: ${{ github.token }}
          PUBLISH_RELEASE: ${{ inputs.publish_release }}
        run: |
          set -euo pipefail

          if [ "$PUBLISH_RELEASE" = "true" ]; then
            expected_caller="$GITHUB_REPOSITORY/.github/workflows/auto-release.yml@refs/heads/main"
            if [ "$GITHUB_EVENT_NAME" != "push" ] || [ "$GITHUB_REF" != "refs/heads/main" ] || [ "$GITHUB_WORKFLOW_REF" != "$expected_caller" ]; then
              echo "::error::Publication authority requires the trusted reusable-workflow caller on main."
              exit 1
            fi
            live_head="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
            if [ "$live_head" != "$GITHUB_SHA" ]; then
              echo "::error::main moved from release head $GITHUB_SHA to $live_head."
              exit 1
            fi
            exit 0
          fi

          if [ "$GITHUB_EVENT_NAME" != "workflow_dispatch" ] || [ "$GITHUB_REF" != "refs/heads/dev/codestory-next" ]; then
            echo "::error::Proof-only release runs require a manual dev/codestory-next dispatch."
            exit 1
          fi
          if [ -z "$EXPECTED_HEAD_SHA" ] || [ "$EXPECTED_HEAD_SHA" != "$GITHUB_SHA" ]; then
            echo "::error::Expected dev head $EXPECTED_HEAD_SHA does not match workflow head $GITHUB_SHA."
            exit 1
          fi
          live_head="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/dev/codestory-next" --jq .object.sha)"
          if [ "$live_head" != "$GITHUB_SHA" ]; then
            echo "::error::dev/codestory-next moved from proved head $GITHUB_SHA to $live_head."
            exit 1
          fi

      - name: Verify release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${INPUT_VERSION#v}"
          python .github/scripts/check-codestory-release.py --version "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Validate versioned changelog notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: >-
          node .github/scripts/extract-codestory-release-notes.mjs
          --version "$VERSION"
          --output "$RUNNER_TEMP/codestory-release-notes.md"

      - name: Refuse existing tag or release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Do not push release tags manually."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists."
            exit 1
          fi

  release-evidence:
    needs: preflight
    uses: ./.github/workflows/release-candidate-evidence.yml
    with:
      ref: ${{ github.sha }}
      proof_key: release-${{ needs.preflight.outputs.version }}
      profile: codestory-release-evidence-linux-arm64-v2
      drill_manifest: /srv/codestory-release-evidence/drills/real-repo-drill-cases.json
      source_run_id: ${{ inputs.source_run_id }}
      version: ${{ needs.preflight.outputs.version }}
      emit_release_cells: true
    secrets:
      CODESTORY_RELEASE_EVIDENCE_APPROVAL_JSON: ${{ secrets.CODESTORY_RELEASE_EVIDENCE_APPROVAL_JSON }}

  source-proof:
    needs: preflight
    uses: ./.github/workflows/source-proof.yml
    with:
      ref: ${{ github.sha }}
      proof_key: release-${{ needs.preflight.outputs.version }}
      version: ${{ needs.preflight.outputs.version }}
      emit_release_cells: true

  packaged-proof:
    needs:
      - preflight
      - release-evidence
    uses: ./.github/workflows/packaged-platform-proof.yml
    with:
      version: ${{ needs.preflight.outputs.version }}
      ref: ${{ github.sha }}
      scope: full
      proof_key: release-${{ needs.preflight.outputs.version }}
      sign_macos: true
      emit_release_cells: true
      quality_evidence_artifact: release-evidence-${{ github.sha }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id }}
    # Provision these names as environment secrets on macos-release-signing.
    # That protected environment is selected by the called macOS matrix jobs,
    # and its values take precedence over caller/repository secrets.
    secrets:
      APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
      APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_NOTARY_KEY_P8_BASE64: ${{ secrets.APPLE_NOTARY_KEY_P8_BASE64 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}

  macos-metal-proof:
    needs:
      - preflight
      - packaged-proof
    uses: ./.github/workflows/macos-metal-proof.yml
    with:
      version: ${{ needs.preflight.outputs.version }}
      ref: ${{ github.sha }}
      proof_key: release-${{ needs.preflight.outputs.version }}
      use_packaged_cli_artifact: true
      quality_evidence_artifact: release-evidence-${{ github.sha }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id }}
      emit_release_cells: true

  windows-vulkan-proof:
    needs:
      - preflight
      - packaged-proof
    uses: ./.github/workflows/windows-vulkan-proof.yml
    with:
      version: ${{ needs.preflight.outputs.version }}
      ref: ${{ github.sha }}
      proof_key: release-${{ needs.preflight.outputs.version }}
      use_packaged_cli_artifact: true
      quality_evidence_artifact: release-evidence-${{ github.sha }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id }}
      emit_release_cells: true

  pre-publish-closeout:
    name: Authenticate pre-publish release cells
    needs:
      - preflight
      - source-proof
      - release-evidence
      - packaged-proof
      - macos-metal-proof
      - windows-vulkan-proof
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact release source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Authenticate pre-publish Actions provenance
        id: pre-publish-provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/codestory-release-cell-manifest.mjs producer-map \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "$GITHUB_SHA" \
            --phase pre_publish \
            --producer-run-id "$GITHUB_RUN_ID" \
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --out target/release-closeout/trusted-pre-publish-producers.json
          artifact_ids="$(jq -r '[.artifacts[].id] | join(",")' target/release-closeout/trusted-pre-publish-producers.json)"
          test -n "$artifact_ids"
          echo "artifact_ids=$artifact_ids" >> "$GITHUB_OUTPUT"

      - name: Download selected pre-publish release cells
        uses: actions/download-artifact@v8.0.1
        with:
          artifact-ids: ${{ steps.pre-publish-provenance.outputs.artifact_ids }}
          path: target/release-cell-manifests
          merge-multiple: false

      - name: Verify selected pre-publish artifact container digests
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release-cell-containers
          jq -r '.artifacts[] | [.id, .digest] | @tsv' target/release-closeout/trusted-pre-publish-producers.json |
            while IFS=$'\t' read -r artifact_id expected_digest; do
              archive="target/release-cell-containers/$artifact_id.zip"
              curl --fail --location --silent --show-error \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
                --output "$archive"
              actual_digest="sha256:$(sha256sum "$archive" | awk '{print $1}')"
              test "$actual_digest" = "$expected_digest"
            done

      - name: Evaluate authenticated pre-publish closeout
        shell: bash
        run: |
          set -euo pipefail
          trusted_exceptions="$(find target/release-cell-manifests -type f -name trusted-exceptions.json -print)"
          test "$(printf '%s\n' "$trusted_exceptions" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          evaluated_at="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          node scripts/codestory-release-closeout.mjs evaluate \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "$GITHUB_SHA" \
            --version "${{ needs.preflight.outputs.version }}" \
            --phase pre_publish \
            --evaluated-at "$evaluated_at" \
            --trusted-producers target/release-closeout/trusted-pre-publish-producers.json \
            --trusted-exceptions "$trusted_exceptions" \
            --manifest-dir target/release-cell-manifests \
            --out-dir target/release-closeout/pre_publish

      - name: Revalidate proof-only dev head
        if: ${{ !inputs.publish_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          live_head="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/dev/codestory-next" --jq .object.sha)"
          if [ "$live_head" != "$GITHUB_SHA" ]; then
            echo "::error::dev/codestory-next moved from accepted ledger head $GITHUB_SHA to $live_head."
            exit 1
          fi

      - name: Upload accepted pre-publish closeout
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-closeout-pre-publish-${{ needs.preflight.outputs.version }}-${{ github.sha }}
          path: |
            target/release-closeout/trusted-pre-publish-producers.json
            target/release-closeout/pre_publish
          if-no-files-found: error
          retention-days: 30
          overwrite: true

  publish:
    name: Publish GitHub release
    if: inputs.publish_release
    needs:
      - preflight
      - pre-publish-closeout
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release assets
        uses: actions/download-artifact@v8.0.1
        with:
          path: target/release-assets
          pattern: codestory-cli-*
          merge-multiple: true

      - name: Combine and verify checksums
        run: |
          set -euo pipefail
          find target/release-assets -name '*.sha256' -print0 | sort -z | xargs -0 cat > target/release-assets/SHA256SUMS.txt
          test -s target/release-assets/SHA256SUMS.txt
          (cd target/release-assets && sha256sum -c SHA256SUMS.txt)

      - name: Compose versioned GitHub release notes
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          node .github/scripts/extract-codestory-release-notes.mjs \
            --version "$VERSION" \
            --output target/release-assets/release-notes.md
          cat >> target/release-assets/release-notes.md <<'EOF'

          ## Platform proof boundaries

          This release ships managed CLI assets for Windows x64/arm64, Linux x64/arm64, and macOS x64/arm64.

          - Windows x64 managed install and local ground are acceptance-smoked; accelerated retrieval requires the protected Vulkan hardware proof.
          - Apple Silicon release assets are Developer ID signed, notarized, and gated on packaged per-user-server Metal qualification with frozen evidence.
          - Intel macOS packaging is acceptance-smoked; it does not make Apple Silicon Metal claims.
          - Windows arm64 ships a CLI asset but has no protected accelerated embedding cell.
          - Linux accelerator claims still require the evidence tiers in `docs/contributors/testing-matrix.md`.
          - Linux x64 is packaged and executed at the glibc 2.31 baseline; this does not claim musl support or Linux arm64 baseline parity.
          EOF

      - name: Refuse existing tag or release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag $TAG already exists. Do not push release tags manually."
            exit 1
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.preflight.outputs.tag }}
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          # Release globs must expand into individual assets.
          # shellcheck disable=SC2206
          assets=(
            target/release-assets/codestory-cli-v${VERSION}-*.tar.gz
            target/release-assets/codestory-cli-v${VERSION}-*.zip
            target/release-assets/SHA256SUMS.txt
          )
          if [ "${#assets[@]}" -ne 7 ]; then
            echo "::error::Expected six binary archives plus SHA256SUMS.txt, found ${#assets[@]} assets."
            printf '%s\n' "${assets[@]}"
            exit 1
          fi
          live_head="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          if [ "$live_head" != "$GITHUB_SHA" ]; then
            echo "::error::main moved from publishable head $GITHUB_SHA to $live_head."
            exit 1
          fi
          gh release create "$TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "CodeStory $TAG" \
            --notes-file target/release-assets/release-notes.md

  post-publish-smoke:
    name: Post-publish release asset smoke
    if: inputs.publish_release
    needs:
      - preflight
      - publish
    uses: ./.github/workflows/post-publish-release-smoke.yml
    with:
      version: ${{ needs.preflight.outputs.version }}
      quality_evidence_artifact: release-evidence-${{ github.sha }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id }}
      pre_publish_closeout_artifact: release-closeout-pre-publish-${{ needs.preflight.outputs.version }}-${{ github.sha }}
      emit_release_cells: true
    permissions:
      actions: read
      contents: read

  post-publish-closeout:
    name: Authenticate post-publish release cells
    if: inputs.publish_release
    needs:
      - preflight
      - pre-publish-closeout
      - post-publish-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact release source
        uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Authenticate post-publish Actions provenance
        id: post-publish-provenance
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          node scripts/codestory-release-cell-manifest.mjs producer-map \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "$GITHUB_SHA" \
            --phase post_publish \
            --producer-run-id "$GITHUB_RUN_ID" \
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --out target/release-closeout/trusted-post-publish-producers.json
          artifact_ids="$(jq -r '[.artifacts[].id] | join(",")' target/release-closeout/trusted-post-publish-producers.json)"
          test -n "$artifact_ids"
          echo "artifact_ids=$artifact_ids" >> "$GITHUB_OUTPUT"

      - name: Download selected release cells without flattening
        uses: actions/download-artifact@v8.0.1
        with:
          artifact-ids: ${{ steps.post-publish-provenance.outputs.artifact_ids }}
          path: target/release-cell-manifests
          merge-multiple: false

      - name: Verify selected post-publish artifact container digests
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/release-cell-containers
          jq -r '.artifacts[] | [.id, .digest] | @tsv' target/release-closeout/trusted-post-publish-producers.json |
            while IFS=$'\t' read -r artifact_id expected_digest; do
              archive="target/release-cell-containers/$artifact_id.zip"
              curl --fail --location --silent --show-error \
                --header "Accept: application/vnd.github+json" \
                --header "Authorization: Bearer $GH_TOKEN" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/$artifact_id/zip" \
                --output "$archive"
              actual_digest="sha256:$(sha256sum "$archive" | awk '{print $1}')"
              test "$actual_digest" = "$expected_digest"
            done

      - name: Download accepted pre-publish closeout
        uses: actions/download-artifact@v8.0.1
        with:
          name: release-closeout-pre-publish-${{ needs.preflight.outputs.version }}-${{ github.sha }}
          path: target/accepted-pre-publish-closeout

      - name: Evaluate authenticated post-publish closeout
        shell: bash
        run: |
          set -euo pipefail
          ledger="$(find target/accepted-pre-publish-closeout -type f -name ledger.json -print)"
          test "$(printf '%s\n' "$ledger" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          trusted_exceptions="$(find target/release-cell-manifests -type f -name trusted-exceptions.json -print)"
          test "$(printf '%s\n' "$trusted_exceptions" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          evaluated_at="$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')"
          node scripts/codestory-release-closeout.mjs evaluate \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "$GITHUB_SHA" \
            --version "${{ needs.preflight.outputs.version }}" \
            --phase post_publish \
            --evaluated-at "$evaluated_at" \
            --trusted-producers target/release-closeout/trusted-post-publish-producers.json \
            --trusted-exceptions "$trusted_exceptions" \
            --manifest-dir target/release-cell-manifests \
            --pre-publish-ledger "$ledger" \
            --out-dir target/release-closeout/post_publish

      - name: Upload accepted post-publish closeout
        if: success()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-closeout-post-publish-${{ needs.preflight.outputs.version }}-${{ github.sha }}-attempt-${{ github.run_attempt }}
          path: |
            target/release-closeout/trusted-post-publish-producers.json
            target/release-closeout/post_publish
          if-no-files-found: error
          retention-days: 30
