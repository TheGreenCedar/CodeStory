name: Post-publish release smoke

on:
  workflow_call:
    inputs:
      version:
        description: Release version to smoke, with or without a leading v.
        required: true
        type: string
      quality_evidence_artifact:
        description: Exact-head release-evidence artifact containing packet/packet-runtime-summary.json.
        required: false
        default: ""
        type: string
      calibration_bundle_artifact:
        description: Frozen calibration bundle artifact name.
        required: true
        type: string
      calibration_bundle_run_id:
        description: Workflow run that produced the frozen calibration bundle artifact.
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: Release version to smoke, with or without a leading v.
        required: true
        type: string
      quality_evidence_artifact:
        description: Existing exact-head release-evidence artifact name.
        required: false
        type: string
      calibration_bundle_artifact:
        description: Frozen calibration bundle artifact name.
        required: true
        type: string
      calibration_bundle_run_id:
        description: Workflow run that produced the frozen calibration bundle artifact.
        required: true
        type: string

permissions:
  actions: read
  contents: read

env:
  RELEASE_RUST_TOOLCHAIN: "1.95.0"
  APPLE_DEVELOPER_TEAM_ID: "PKUJNR8D6F"

jobs:
  smoke:
    name: Published ${{ matrix.asset_target }} smoke
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_target: linux-x64
            extension: tar.gz
          - os: ubuntu-24.04-arm
            asset_target: linux-arm64
            extension: tar.gz
          - os: windows-latest
            asset_target: windows-x64
            extension: zip
          - os: windows-11-arm
            asset_target: windows-arm64
            extension: zip
          - os: macos-15-intel
            asset_target: macos-x64
            extension: tar.gz
          - os: macos-15
            asset_target: macos-arm64
            extension: tar.gz
    steps:
      - name: Normalize release version
        id: release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "::error::version input is required"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - name: Download exact-head publishable packet quality evidence
        if: inputs.quality_evidence_artifact != ''
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.quality_evidence_artifact }}
          path: target/release-quality-evidence

      - name: Authenticate calibration bundle producer
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CALIBRATION_ARTIFACT: ${{ inputs.calibration_bundle_artifact }}
          CALIBRATION_RUN_ID: ${{ inputs.calibration_bundle_run_id }}
        run: |
          set -euo pipefail
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID")"
          producer_sha="$(jq -r '.head_sha' <<<"$run")"
          test "$(jq -r '.head_repository.full_name' <<<"$run")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.path' <<<"$run")" = ".github/workflows/packaged-platform-pr.yml"
          test "$(jq -r '.event' <<<"$run")" = workflow_dispatch
          test "$(jq -r '.conclusion' <<<"$run")" = success
          test "$CALIBRATION_ARTIFACT" = "embedding-calibration-bundle-$producer_sha"
          artifact_count="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID/artifacts?per_page=100" \
              | jq --arg name "$CALIBRATION_ARTIFACT" \
                '[.artifacts[] | select(.name == $name and .expired == false)] | length'
          )"
          test "$artifact_count" = 1

      - name: Download frozen calibration bundle
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.calibration_bundle_artifact }}
          path: target/calibration-bundle
          run-id: ${{ inputs.calibration_bundle_run_id }}
          github-token: ${{ github.token }}

      - name: Download published asset and checksum
        id: asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          ASSET_TARGET: ${{ matrix.asset_target }}
          EXTENSION: ${{ matrix.extension }}
        run: |
          set -euo pipefail
          dir="target/post-publish-release-assets"
          asset="codestory-cli-v${VERSION}-${ASSET_TARGET}.${EXTENSION}"
          mkdir -p "$dir"
          gh release download "$TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --pattern "SHA256SUMS.txt" \
            --dir "$dir" \
            --clobber
          echo "archive=$dir/$asset" >> "$GITHUB_OUTPUT"
          echo "checksum=$dir/SHA256SUMS.txt" >> "$GITHUB_OUTPUT"

      - name: Prove packaged version, help, and stdio shape
        run: >-
          python .github/scripts/check-packaged-agent-proof.py
          --archive "${{ steps.asset.outputs.archive }}"
          --checksum-file "${{ steps.asset.outputs.checksum }}"
          --expected-version "${{ steps.release.outputs.version }}"
          --version-only
          --out-dir "target/post-publish-version-proof/${{ matrix.asset_target }}"

      - name: Prove published macOS signature, notarization, and quarantined execution
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          proof_dir="target/post-publish-macos-signing/${{ matrix.asset_target }}"
          unpacked="$proof_dir/unpacked"
          mkdir -p "$unpacked"
          quarantine="0083;$(date +%s);CodeStory;"
          xattr -w com.apple.quarantine "$quarantine" "${{ steps.asset.outputs.archive }}"
          xattr -p com.apple.quarantine "${{ steps.asset.outputs.archive }}" \
            > "$proof_dir/archive-quarantine.txt"
          tar -xzf "${{ steps.asset.outputs.archive }}" -C "$unpacked"
          bins="$(find "$unpacked" -type f -name codestory-cli -print)"
          count="$(printf '%s\n' "$bins" | sed '/^$/d' | wc -l | tr -d ' ')"
          if [ "$count" -ne 1 ]; then
            echo "::error::Expected one codestory-cli in the macOS archive, found $count"
            exit 1
          fi
          bin="$bins"
          chmod +x "$bin"
          codesign --verify --strict --verbose=2 "$bin"
          codesign -dv --verbose=4 "$bin" 2> "$proof_dir/codesign-details.txt"
          codesign -d -r- "$bin" > "$proof_dir/designated-requirement.txt" 2>&1
          grep -F "Authority=Developer ID Application:" "$proof_dir/codesign-details.txt"
          grep -E "flags=.*runtime" "$proof_dir/codesign-details.txt"
          grep -E "^TeamIdentifier=${APPLE_DEVELOPER_TEAM_ID}$" "$proof_dir/codesign-details.txt"
          grep -E "certificate leaf\\[subject\\.OU\\] = \"?${APPLE_DEVELOPER_TEAM_ID}\"?([[:space:]]|$)" \
            "$proof_dir/designated-requirement.txt"
          # Command-line tar does not propagate the download quarantine xattr,
          # so retain the archive evidence and explicitly transfer the same
          # quarantine event to the extracted executable before assessment.
          xattr -w com.apple.quarantine "$quarantine" "$bin"
          xattr -p com.apple.quarantine "$bin" > "$proof_dir/extracted-binary-quarantine.txt"
          set +e
          spctl --assess --type execute --verbose=4 "$bin" > "$proof_dir/spctl-diagnostic.txt" 2>&1
          spctl_status=$?
          set -e
          printf '%s\n' "$spctl_status" > "$proof_dir/spctl-status.txt"
          if [ "$spctl_status" -eq 0 ]; then
            grep -F "source=Notarized Developer ID" "$proof_dir/spctl-diagnostic.txt"
          else
            grep -F "does not seem to be an app" "$proof_dir/spctl-diagnostic.txt"
          fi
          "$bin" --version
          "$bin" --help >/dev/null

      - name: Run Windows installer ownership self-test
        if: matrix.asset_target == 'windows-x64'
        shell: pwsh
        run: pwsh -File scripts/install-codestory.ps1 -SelfTest

      - name: Install pinned Rust for Windows rollback proof
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          rustup toolchain install "${{ env.RELEASE_RUST_TOOLCHAIN }}" --profile minimal
          rustup default "${{ env.RELEASE_RUST_TOOLCHAIN }}"

      - name: Resolve the marketplace-installed plugin
        id: installed
        shell: bash
        env:
          MARKETPLACE_REPOSITORY: TheGreenCedar/AgentPluginMarketplace
        run: |
          set -euo pipefail
          install_root="$RUNNER_TEMP/codestory-installed-proof"
          marketplace_root="$install_root/marketplace"
          plugin_root="$install_root/plugin"
          plugin_data="$install_root/plugin-data"
          provenance="$install_root/provenance.json"
          rm -rf "$install_root"
          mkdir -p "$plugin_root" "$plugin_data"
          git clone --depth 1 \
            "https://github.com/${MARKETPLACE_REPOSITORY}.git" \
            "$marketplace_root"
          marketplace_commit="$(git -C "$marketplace_root" rev-parse HEAD)"
          plugin_source_commit="$(
            git ls-remote https://github.com/TheGreenCedar/CodeStory.git \
              refs/heads/main | awk '{print $1}'
          )"
          release_commit="$(git rev-parse HEAD)"
          if [ "$plugin_source_commit" != "$release_commit" ]; then
            echo "::error::Marketplace source main is not the exact published release commit"
            exit 1
          fi
          git archive --format=tar HEAD:plugins/codestory |
            tar -xf - -C "$plugin_root"
          python - \
            "$marketplace_root/.agents/plugins/marketplace.json" \
            "$plugin_root" \
            "$provenance" \
            "$marketplace_commit" \
            "$plugin_source_commit" \
            "${{ steps.release.outputs.version }}" <<'PY'
          import hashlib
          import json
          import os
          import pathlib
          import sys

          (
              catalog_path,
              plugin_root_raw,
              provenance_path,
              marketplace_commit,
              plugin_source_commit,
              version,
          ) = sys.argv[1:]
          catalog = json.loads(pathlib.Path(catalog_path).read_text(encoding="utf-8"))
          matches = [
              plugin
              for plugin in catalog.get("plugins", [])
              if plugin.get("name") == "codestory"
          ]
          if len(matches) != 1:
              raise SystemExit("marketplace must contain exactly one codestory plugin")
          source = matches[0].get("source", {})
          if source != {
              "source": "git-subdir",
              "url": "https://github.com/TheGreenCedar/CodeStory.git",
              "path": "plugins/codestory",
          }:
              raise SystemExit("marketplace codestory source is not the release repository plugin")
          plugin_root = pathlib.Path(plugin_root_raw)
          digest = hashlib.sha256()
          files = sorted(path for path in plugin_root.rglob("*") if path.is_file())
          if not files:
              raise SystemExit("installed plugin package is empty")
          for path in files:
              if path.is_symlink():
                  raise SystemExit(f"installed plugin package contains a symlink: {path}")
              relative = path.relative_to(plugin_root).as_posix().encode("utf-8")
              payload = path.read_bytes()
              digest.update(len(relative).to_bytes(8, "little"))
              digest.update(relative)
              digest.update(len(payload).to_bytes(8, "little"))
              digest.update(payload)
          document = {
              "schema_version": 1,
              "marketplace_repository": "TheGreenCedar/AgentPluginMarketplace",
              "marketplace_commit": marketplace_commit,
              "plugin_id": "codestory",
              "plugin_version": version,
              "plugin_source_commit": plugin_source_commit,
              "plugin_package_sha256": digest.hexdigest(),
          }
          pathlib.Path(provenance_path).write_text(
              json.dumps(document, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
          {
            echo "plugin_root=$plugin_root"
            echo "plugin_data=$plugin_data"
            echo "provenance=$provenance"
          } >> "$GITHUB_OUTPUT"

      - name: Qualify the marketplace-managed installed runtime
        env:
          CODESTORY_EMBED_ALLOW_CPU: "1"
        shell: bash
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse 'HEAD^{tree}')"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          matrix_cell="installed_${{ matrix.asset_target }}_cpu"
          matrix_cell="${matrix_cell//-/_}"
          quality_args=()
          quality_path="target/release-quality-evidence/packet/packet-runtime-summary.json"
          if [ -f "$quality_path" ]; then
            quality_args=(--retrieval-quality-evidence "$quality_path")
          fi
          python .github/scripts/check-packaged-agent-proof.py \
            --archive "${{ steps.asset.outputs.archive }}" \
            --checksum-file "${{ steps.asset.outputs.checksum }}" \
            --expected-version "${{ steps.release.outputs.version }}" \
            --project "${{ github.workspace }}" \
            --plugin-root "${{ steps.installed.outputs.plugin_root }}" \
            --plugin-handoff \
            --engine-policy cpu_explicit \
            --expected-backend CPU \
            --proof-tier installed_runtime \
            --qualification-matrix-cell "$matrix_cell" \
            --produce-qualification-evidence \
            --qualification-evidence target/post-publish-installed-proof/qualification.json \
            --calibration-bundle "$calibration_bundle" \
            --calibration-producer-run-id "${{ inputs.calibration_bundle_run_id }}" \
            --calibration-producer-artifact "${{ inputs.calibration_bundle_artifact }}" \
            --installed-plugin-source marketplace \
            --installed-plugin-provenance "${{ steps.installed.outputs.provenance }}" \
            --installed-plugin-data "${{ steps.installed.outputs.plugin_data }}" \
            --expected-source-sha "$source_sha" \
            --expected-source-tree "$source_tree" \
            "${quality_args[@]}" \
            --timeout-secs 3600 \
            --out-dir target/post-publish-installed-proof

      - name: Upload post-publish proof artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: post-publish-proof-${{ matrix.asset_target }}-${{ steps.release.outputs.version }}
          path: |
            target/post-publish-version-proof/${{ matrix.asset_target }}
            target/post-publish-installed-proof
            target/post-publish-macos-signing/${{ matrix.asset_target }}
          if-no-files-found: error
          retention-days: 30
