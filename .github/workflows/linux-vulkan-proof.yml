name: Linux Vulkan proof

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
      ref:
        required: true
        type: string
      proof_key:
        required: false
        default: ""
        type: string
      package_run_id:
        description: Optional upstream run containing the Linux package for a standalone proof.
        required: false
        default: ""
        type: string
      calibration_bundle_artifact:
        required: true
        type: string
      calibration_bundle_run_id:
        required: true
        type: string
      candidate_installed_proof:
        description: Stage and qualify the exact package through the private candidate-managed launcher boundary.
        required: false
        default: false
        type: boolean
      candidate_producer_workflow_path:
        description: Top-level workflow path authenticated as the candidate artifact producer.
        required: false
        default: ".github/workflows/release.yml"
        type: string
      server_behavior_only:
        description: Prove bounded package retrieval readiness without answer-quality or performance claims.
        required: false
        default: true
        type: boolean
      emit_release_cells:
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        required: true
        type: string
      ref:
        required: true
        type: string
      proof_key:
        required: false
        type: string
      package_run_id:
        description: Upstream packaged-platform run containing codestory-cli-linux-x64.
        required: true
        type: string
      calibration_bundle_artifact:
        required: true
        type: string
      calibration_bundle_run_id:
        required: true
        type: string
      candidate_installed_proof:
        description: Stage and qualify the exact package through the private candidate-managed launcher boundary.
        required: false
        default: true
        type: boolean
      candidate_producer_workflow_path:
        description: Top-level workflow path authenticated as the candidate artifact producer.
        required: false
        default: ".github/workflows/linux-vulkan-proof.yml"
        type: string
      server_behavior_only:
        description: Prove bounded package retrieval readiness without answer-quality or performance claims.
        required: false
        default: true
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: linux-vulkan-proof-${{ inputs.proof_key || inputs.ref }}
  cancel-in-progress: true

jobs:
  packaged-vulkan:
    name: Packaged Linux Vulkan engine
    runs-on: [self-hosted, Linux, X64, codestory-linux-vulkan]
    environment: linux-vulkan-proof
    timeout-minutes: 120
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Install pinned Python
        uses: actions/setup-python@v7.0.0
        with:
          python-version: "3.13"

      - name: Capture Linux Vulkan host evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/linux-vulkan-proof
          {
            uname -a
            uname -m
            lscpu
            command -v vulkaninfo
            vulkaninfo --summary
          } > target/linux-vulkan-proof/host.txt 2>&1
          test "$(uname -m)" = x86_64

      - name: Download exact Linux package
        uses: actions/download-artifact@v8.0.1
        with:
          name: codestory-cli-linux-x64
          path: target/release-dist
          run-id: ${{ inputs.package_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Authenticate calibration bundle producer
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CALIBRATION_ARTIFACT: ${{ inputs.calibration_bundle_artifact }}
          CALIBRATION_RUN_ID: ${{ inputs.calibration_bundle_run_id }}
        run: |
          set -euo pipefail
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID")"
          producer_sha="$(jq -r '.head_sha' <<<"$run")"
          test "$(jq -r '.head_repository.full_name' <<<"$run")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.path' <<<"$run")" = ".github/workflows/packaged-platform-pr.yml"
          test "$(jq -r '.event' <<<"$run")" = workflow_dispatch
          test "$(jq -r '.conclusion' <<<"$run")" = success
          test "$CALIBRATION_ARTIFACT" = "embedding-calibration-bundle-$producer_sha"
          artifact_count="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID/artifacts?per_page=100" \
              | jq --arg name "$CALIBRATION_ARTIFACT" \
                '[.artifacts[] | select(.name == $name and .expired == false)] | length'
          )"
          test "$artifact_count" = 1

      - name: Download frozen calibration bundle
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.calibration_bundle_artifact }}
          path: target/calibration-bundle
          run-id: ${{ inputs.calibration_bundle_run_id }}
          github-token: ${{ github.token }}

      - name: Prove offline Linux Vulkan retrieval
        shell: bash
        env:
          CODESTORY_EMBED_ALLOW_CPU: "0"
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          archive="target/release-dist/codestory-cli-v${version}-linux-x64.tar.gz"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          source_sha="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse 'HEAD^{tree}')"
          claim_args=()
          if [ "${{ inputs.server_behavior_only }}" = true ]; then
            claim_args=(--server-behavior-only)
          fi
          python .github/scripts/check-packaged-agent-proof.py \
            --archive "$archive" \
            --checksum-file target/release-dist/SHA256SUMS.txt \
            --expected-version "$version" \
            --project "$GITHUB_WORKSPACE" \
            --plugin-root plugins/codestory \
            --plugin-handoff \
            --engine-policy accelerated \
            --expected-backend Vulkan \
            --offline \
            --proof-tier protected_hardware \
            --qualification-matrix-cell protected_linux_x64_vulkan \
            "${claim_args[@]}" \
            --calibration-bundle "$calibration_bundle" \
            --calibration-producer-run-id "${{ inputs.calibration_bundle_run_id }}" \
            --calibration-producer-artifact "${{ inputs.calibration_bundle_artifact }}" \
            --expected-source-sha "$source_sha" \
            --expected-source-tree "$source_tree" \
            --timeout-secs 1800 \
            --out-dir target/linux-vulkan-proof/packaged-agent

      - name: Stage isolated candidate-managed Linux install
        if: inputs.candidate_installed_proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CANDIDATE_PRODUCER_WORKFLOW_PATH: ${{ inputs.candidate_producer_workflow_path }}
        run: |
          set -euo pipefail
          umask 077
          test -n "$CANDIDATE_PRODUCER_WORKFLOW_PATH"
          candidate_producer_run_id="${{ inputs.package_run_id || github.run_id }}"
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$candidate_producer_run_id")"
          test "$(jq -r '.head_repository.full_name' <<<"$run")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.path' <<<"$run")" = "$CANDIDATE_PRODUCER_WORKFLOW_PATH"
          test "$(jq -r '.head_sha' <<<"$run")" = "$(git rev-parse HEAD)"
          candidate_producer_run_attempt="$(jq -r '.run_attempt' <<<"$run")"
          test "$candidate_producer_run_attempt" -ge 1
          echo "CODESTORY_CANDIDATE_PRODUCER_RUN_ID=$candidate_producer_run_id" >> "$GITHUB_ENV"
          echo "CODESTORY_CANDIDATE_PRODUCER_RUN_ATTEMPT=$candidate_producer_run_attempt" >> "$GITHUB_ENV"
          version="${{ inputs.version }}"
          version="${version#v}"
          archive="target/release-dist/codestory-cli-v${version}-linux-x64.tar.gz"
          candidate_root="$(mktemp -d "$RUNNER_TEMP/codestory-candidate-installed-linux.XXXXXX")"
          candidate_root="$(cd "$candidate_root" && pwd -P)"
          case "$candidate_root/" in
            "$GITHUB_WORKSPACE/"*)
              echo "::error::Candidate-managed root must be outside the source checkout."
              exit 1
              ;;
          esac
          echo "CODESTORY_CANDIDATE_LINUX_ROOT=$candidate_root" >> "$GITHUB_ENV"
          mkdir -p target/candidate-installed-linux
          python .github/scripts/check-packaged-agent-proof.py \
            --prepare-candidate-installed-proof \
            --archive "$archive" \
            --checksum-file target/release-dist/SHA256SUMS.txt \
            --expected-version "$version" \
            --plugin-root plugins/codestory \
            --candidate-plugin-root-output "$candidate_root/plugin" \
            --candidate-plugin-data-output "$candidate_root/data" \
            --installed-plugin-attestation-output target/candidate-installed-linux/install-attestation-v2.json \
            --candidate-producer-repository "$GITHUB_REPOSITORY" \
            --candidate-producer-workflow-path "$CANDIDATE_PRODUCER_WORKFLOW_PATH" \
            --candidate-producer-run-id "$candidate_producer_run_id" \
            --candidate-producer-run-attempt "$candidate_producer_run_attempt" \
            --candidate-artifact-name "$(basename "$archive")"

      - name: Prove candidate-installed Linux Vulkan runtime
        if: inputs.candidate_installed_proof
        shell: bash
        env:
          CODESTORY_EMBED_ALLOW_CPU: "0"
          CANDIDATE_PRODUCER_WORKFLOW_PATH: ${{ inputs.candidate_producer_workflow_path }}
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          archive="target/release-dist/codestory-cli-v${version}-linux-x64.tar.gz"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          python .github/scripts/check-packaged-agent-proof.py \
            --archive "$archive" \
            --checksum-file target/release-dist/SHA256SUMS.txt \
            --expected-version "$version" \
            --project "$GITHUB_WORKSPACE" \
            --plugin-root "$CODESTORY_CANDIDATE_LINUX_ROOT/plugin" \
            --plugin-handoff \
            --engine-policy accelerated \
            --expected-backend Vulkan \
            --offline \
            --proof-tier installed_runtime \
            --qualification-matrix-cell candidate_installed_linux_x64_vulkan \
            --ground-only \
            --calibration-bundle "$calibration_bundle" \
            --calibration-producer-run-id "${{ inputs.calibration_bundle_run_id }}" \
            --calibration-producer-artifact "${{ inputs.calibration_bundle_artifact }}" \
            --installed-plugin-attestation target/candidate-installed-linux/install-attestation-v2.json \
            --installed-plugin-data "$CODESTORY_CANDIDATE_LINUX_ROOT/data" \
            --candidate-producer-repository "$GITHUB_REPOSITORY" \
            --candidate-producer-workflow-path "$CANDIDATE_PRODUCER_WORKFLOW_PATH" \
            --candidate-producer-run-id "$CODESTORY_CANDIDATE_PRODUCER_RUN_ID" \
            --candidate-producer-run-attempt "$CODESTORY_CANDIDATE_PRODUCER_RUN_ATTEMPT" \
            --candidate-artifact-name "$(basename "$archive")" \
            --expected-source-sha "$(git rev-parse HEAD)" \
            --expected-source-tree "$(git rev-parse 'HEAD^{tree}')" \
            --timeout-secs 1800 \
            --out-dir target/candidate-installed-linux/proof

      - name: Upload candidate-installed Linux proof
        if: always() && inputs.candidate_installed_proof
        uses: actions/upload-artifact@v7.0.1
        with:
          name: candidate-installed-linux-${{ inputs.version }}-attempt-${{ github.run_attempt }}
          path: target/candidate-installed-linux
          if-no-files-found: error
          retention-days: 30

      - name: Emit authenticated Linux Vulkan release cells
        if: inputs.emit_release_cells
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"
          version="${version#v}"
          archive="target/release-dist/codestory-cli-v${version}-linux-x64.tar.gz"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          mkdir -p target/release-cells
          jq -n \
            --arg native_engine coderank_q8_embedded \
            --arg calibration_sha256 "$(python -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$calibration_bundle")" \
            '{native_engine: $native_engine, calibration_sha256: $calibration_sha256}' \
            > target/linux-vulkan-proof/release-cell-identity.json
          common=(
            --repo "$GITHUB_WORKSPACE"
            --expected-sha "${{ inputs.ref }}"
            --version "$version"
            --producer-workflow .github/workflows/linux-vulkan-proof.yml
            --producer-job packaged-vulkan
            --producer-run-id "$GITHUB_RUN_ID"
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT"
          )
          node scripts/codestory-release-cell-manifest.mjs produce \
            "${common[@]}" \
            --cell-id accelerator_execution:linux-x64-vulkan \
            --producer-artifact "release-cell-prepublish-linux-x64-vulkan-attempt-$GITHUB_RUN_ATTEMPT" \
            --identity target/linux-vulkan-proof/release-cell-identity.json \
            --archive "$archive" \
            --out target/release-cells/accelerator_execution-linux-x64-vulkan.json
          node scripts/codestory-release-cell-manifest.mjs produce \
            "${common[@]}" \
            --cell-id retrieval_readiness:linux-x64 \
            --producer-artifact "release-cell-postpublish-retrieval-linux-x64-attempt-$GITHUB_RUN_ATTEMPT" \
            --archive "$archive" \
            --out target/release-cells/retrieval_readiness-linux-x64.json
          if [ "${{ inputs.candidate_installed_proof }}" = true ]; then
            jq -n \
              --arg installer candidate_managed_plugin \
              --arg runtime_version "$version" \
              --arg native_engine coderank_q8_embedded \
              --arg calibration_sha256 "$(python -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$calibration_bundle")" \
              '{installer: $installer, runtime_version: $runtime_version, native_engine: $native_engine, calibration_sha256: $calibration_sha256}' \
              > target/candidate-installed-linux/release-cell-identity.json
            node scripts/codestory-release-cell-manifest.mjs produce \
              "${common[@]}" \
              --cell-id candidate_installed_behavior:linux-x64 \
              --producer-artifact "release-cell-prepublish-candidate-installed-linux-x64-attempt-$GITHUB_RUN_ATTEMPT" \
              --identity target/candidate-installed-linux/release-cell-identity.json \
              --archive "$archive" \
              --out target/release-cells/candidate_installed_behavior-linux-x64.json
          fi

      - name: Upload authenticated Linux accelerator release cell
        if: success() && inputs.emit_release_cells
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-cell-prepublish-linux-x64-vulkan-attempt-${{ github.run_attempt }}
          path: target/release-cells/accelerator_execution-linux-x64-vulkan.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload authenticated Linux retrieval release cell
        if: success() && inputs.emit_release_cells
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-cell-postpublish-retrieval-linux-x64-attempt-${{ github.run_attempt }}
          path: target/release-cells/retrieval_readiness-linux-x64.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload authenticated candidate-installed Linux release cell
        if: success() && inputs.emit_release_cells && inputs.candidate_installed_proof
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-cell-prepublish-candidate-installed-linux-x64-attempt-${{ github.run_attempt }}
          path: target/release-cells/candidate_installed_behavior-linux-x64.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Linux Vulkan proof artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: linux-x64-vulkan-proof-${{ inputs.version }}-attempt-${{ github.run_attempt }}
          path: target/linux-vulkan-proof
          if-no-files-found: error
          retention-days: 30
