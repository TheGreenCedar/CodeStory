name: macOS Apple Silicon Metal proof

on:
  workflow_call:
    inputs:
      version:
        description: CodeStory version to prove.
        required: true
        type: string
      ref:
        description: Git ref to check out. Defaults to the caller SHA.
        required: false
        type: string
      use_packaged_artifact:
        description: Download the signed macOS arm64 artifact produced by packaged-platform-proof.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: CodeStory version to prove.
        required: true
        type: string
      ref:
        description: Git ref to check out. Defaults to the current SHA.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: macos-metal-proof
  cancel-in-progress: false

jobs:
  packaged-metal-lifecycle:
    name: Packaged Apple Silicon Metal lifecycle
    runs-on: [self-hosted, macOS, ARM64, codestory-metal]
    # Configure this environment with release protection rules and restrict the
    # matching self-hosted runner/runner group to this evidence workflow.
    environment: macos-metal-release
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Capture host evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/macos-metal-proof
          {
            sw_vers
            uname -a
            uname -m
            sysctl -n machdep.cpu.brand_string
            xcode-select -p
            node --version
            python3 --version
            docker version
          } > target/macos-metal-proof/host.txt 2>&1
          test "$(uname -m)" = arm64
          macos_major="$(sw_vers -productVersion | cut -d. -f1)"
          test "$macos_major" -ge 15
          docker info >/dev/null

      - name: Install pinned Rust
        if: ${{ !inputs.use_packaged_artifact }}
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0

      - name: Build and package native CLI
        if: ${{ !inputs.use_packaged_artifact }}
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          cargo build --release -p codestory-cli --locked
          python3 .github/scripts/package-codestory-release.py \
            --version "$version" \
            --target macos-arm64 \
            --binary target/release/codestory-cli \
            --out-dir target/release-dist

      - name: Download signed and notarized packaged CLI
        if: inputs.use_packaged_artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: codestory-cli-macos-arm64
          path: target/release-dist

      - name: Verify retrieval setup contracts and fetch model
        shell: bash
        env:
          CODESTORY_EMBED_MODEL_DIR: ${{ runner.temp }}/codestory-metal-models
        run: |
          set -euo pipefail
          node scripts/setup-retrieval-env.mjs --self-test
          node scripts/setup-retrieval-env.mjs --fetch-embed-model --fetch-only

      - name: Prove corrupt model repair
        shell: bash
        env:
          CODESTORY_EMBED_MODEL_DIR: ${{ runner.temp }}/codestory-metal-models
        run: |
          set -euo pipefail
          model="$CODESTORY_EMBED_MODEL_DIR/bge-base-en-v1.5.Q8_0.gguf"
          mkdir -p "$(dirname "$model")" target/macos-metal-proof
          printf 'interrupted-model-install\n' > "$model"
          node scripts/setup-retrieval-env.mjs --fetch-embed-model --fetch-only \
            > target/macos-metal-proof/corrupt-model-repair.txt 2>&1
          shasum -a 256 "$model" >> target/macos-metal-proof/corrupt-model-repair.txt

      - name: Clean marker-owned state from an interrupted earlier hardware attempt
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          index=0
          failed=0
          for root in "$RUNNER_TEMP"/codestory-metal-proof-owned-*; do
            marker="$root/.codestory-macos-metal-proof-owner.json"
            archives=("$root"/codestory-cli-v*-macos-arm64.tar.gz)
            if [ ! -f "$marker" ] || [ "${#archives[@]}" -ne 1 ]; then
              continue
            fi
            if ! python3 .github/scripts/check-packaged-agent-proof.py \
                --project "${{ github.workspace }}" \
                --cleanup-proof-temp-root "$root" \
                --out-dir "target/macos-metal-proof/prior-attempt-cleanup-$index"
            then
              failed=1
            fi
            index=$((index + 1))
          done
          exit "$failed"

      - name: Prove cold, warm, dead-endpoint, recovery, packet, and plugin lifecycle
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CODESTORY_EMBED_MODEL_DIR: ${{ runner.temp }}/codestory-metal-models
          CODESTORY_EMBED_DEVICE_PROVIDER: metal
          CODESTORY_EMBED_ALLOW_CPU: "0"
          CODESTORY_PROOF_TEMP_ROOT: ${{ runner.temp }}/codestory-metal-proof-owned-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          mkdir -p "$CODESTORY_PROOF_TEMP_ROOT/tmp with spaces ü"
          cp "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
            "$CODESTORY_PROOF_TEMP_ROOT/"
          export TMPDIR="$CODESTORY_PROOF_TEMP_ROOT/tmp with spaces ü"
          python3 .github/scripts/check-packaged-agent-proof.py \
            --archive "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
            --checksum-file "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz.sha256" \
            --expected-version "$version" \
            --project "${{ github.workspace }}" \
            --plugin-root plugins/codestory \
            --native-accelerator-lifecycle \
            --managed-plugin-grounding-convergence \
            --native-edge-cases \
            --timeout-secs 1800 \
            --out-dir target/macos-metal-proof/packaged-agent

      - name: Clean and assert proof-owned hardware state
        if: always()
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CODESTORY_PROOF_TEMP_ROOT: ${{ runner.temp }}/codestory-metal-proof-owned-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          archive="$CODESTORY_PROOF_TEMP_ROOT/codestory-cli-v${version}-macos-arm64.tar.gz"
          marker="$CODESTORY_PROOF_TEMP_ROOT/.codestory-macos-metal-proof-owner.json"
          if [ ! -f "$marker" ]; then
            mkdir -p target/macos-metal-proof/final-cleanup
            printf '%s\n' '{"status":"not_started","reason":"proof ownership marker was never written"}' \
              > target/macos-metal-proof/final-cleanup/proof-owned-cleanup.json
            exit 0
          fi
          test -f "$archive"
          python3 .github/scripts/check-packaged-agent-proof.py \
            --project "${{ github.workspace }}" \
            --cleanup-proof-temp-root "$CODESTORY_PROOF_TEMP_ROOT" \
            --out-dir target/macos-metal-proof/final-cleanup

      - name: Upload Metal proof artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-arm64-metal-proof-${{ inputs.version }}
          path: target/macos-metal-proof
          if-no-files-found: error
