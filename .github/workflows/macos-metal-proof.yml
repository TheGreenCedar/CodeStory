name: macOS Apple Silicon Metal proof

on:
  workflow_call:
    inputs:
      version:
        description: CodeStory version to prove.
        required: true
        type: string
      ref:
        description: Git ref to check out. Defaults to the caller SHA.
        required: false
        type: string
      proof_key:
        description: Stable PR, integration, or release identity for cancellation.
        required: false
        default: ""
        type: string
      use_packaged_cli_artifact:
        description: Download the macOS arm64 package artifact produced by packaged-platform-proof.
        required: false
        default: false
        type: boolean
      quality_evidence_artifact:
        description: Exact-head release-evidence artifact containing packet/packet-runtime-summary.json.
        required: false
        default: ""
        type: string
      calibration_bundle_artifact:
        description: Frozen calibration bundle artifact name.
        required: false
        default: ""
        type: string
      calibration_bundle_run_id:
        description: Workflow run that produced the frozen calibration bundle artifact.
        required: false
        default: ""
        type: string
      calibration_mode:
        description: Collect three independent pre-freeze Metal calibration runs.
        required: false
        default: false
        type: boolean
      candidate_installed_proof:
        description: Stage and qualify the exact PR package through the private candidate-managed launcher boundary.
        required: false
        default: false
        type: boolean
      candidate_installed_only:
        description: Run only the CPU-acceptable candidate-installed behavior proof; do not claim Metal execution.
        required: false
        default: false
        type: boolean
      candidate_producer_workflow_path:
        description: Top-level workflow path authenticated as the candidate artifact producer.
        required: false
        default: ".github/workflows/packaged-platform-pr.yml"
        type: string
      server_behavior_only:
        description: Prove server/package behavior without retrieval-quality or release-readiness claims.
        required: false
        default: false
        type: boolean
      emit_release_cells:
        description: Emit the authenticated protected-hardware cell for production release closeout.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      version:
        description: CodeStory version to prove.
        required: true
        type: string
      ref:
        description: Git ref to check out. Defaults to the current SHA.
        required: false
        type: string
      proof_key:
        description: Stable proof identity for cancellation.
        required: false
        type: string
      quality_evidence_artifact:
        description: Existing exact-head release-evidence artifact name.
        required: false
        type: string
      calibration_bundle_artifact:
        description: Frozen calibration bundle artifact name.
        required: true
        type: string
      calibration_bundle_run_id:
        description: Workflow run that produced the frozen calibration bundle artifact.
        required: false
        type: string
      calibration_mode:
        description: Collect three independent pre-freeze Metal calibration runs.
        required: false
        default: false
        type: boolean
      candidate_installed_proof:
        description: Stage and qualify the exact package through the private candidate-managed launcher boundary.
        required: false
        default: false
        type: boolean
      candidate_installed_only:
        description: Run only the CPU-acceptable candidate-installed behavior proof; do not claim Metal execution.
        required: false
        default: false
        type: boolean
      candidate_producer_workflow_path:
        description: Top-level workflow path authenticated as the candidate artifact producer.
        required: false
        default: ".github/workflows/macos-metal-proof.yml"
        type: string
      server_behavior_only:
        description: Prove server/package behavior without retrieval-quality or release-readiness claims.
        required: false
        default: false
        type: boolean

permissions:
  actions: read
  contents: read

concurrency:
  group: macos-metal-proof-${{ inputs.proof_key || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  packaged-metal:
    name: Packaged Apple Silicon Metal engine
    runs-on: [self-hosted, macOS, ARM64, codestory-metal]
    # Configure this environment with release protection rules and restrict the
    # matching self-hosted runner/runner group to this evidence workflow.
    environment: macos-metal-release
    timeout-minutes: ${{ inputs.calibration_mode && 180 || 120 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}
          fetch-depth: 0

      - name: Capture host evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/macos-metal-proof
          {
            sw_vers
            uname -a
            uname -m
            sysctl -n machdep.cpu.brand_string
            xcode-select -p
            node --version
            python3 --version
          } > target/macos-metal-proof/host.txt 2>&1
          test "$(uname -m)" = arm64
          macos_major="$(sw_vers -productVersion | cut -d. -f1)"
          test "$macos_major" -ge 15

      - name: Validate candidate-installed-only mode
        if: inputs.candidate_installed_only
        shell: bash
        run: |
          test "${{ inputs.candidate_installed_proof }}" = true
          test "${{ inputs.server_behavior_only }}" = true

      - name: Install pinned Rust
        if: ${{ !inputs.use_packaged_cli_artifact }}
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0

      - name: Prepare checksum-pinned embedded model
        if: ${{ !inputs.use_packaged_cli_artifact }}
        run: node scripts/prepare-embedded-model.mjs

      - name: Build and package native CLI
        if: ${{ !inputs.use_packaged_cli_artifact }}
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          cargo build --release -p codestory-cli --locked
          python3 .github/scripts/package-codestory-release.py \
            --version "$version" \
            --target macos-arm64 \
            --binary target/release/codestory-cli \
            --out-dir target/release-dist

      - name: Download packaged CLI artifact
        if: inputs.use_packaged_cli_artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: codestory-cli-macos-arm64
          path: target/release-dist

      - name: Download exact-head publishable packet quality evidence
        if: inputs.quality_evidence_artifact != ''
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.quality_evidence_artifact }}
          path: target/release-quality-evidence

      - name: Authenticate calibration bundle producer
        if: ${{ !inputs.calibration_mode }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CALIBRATION_ARTIFACT: ${{ inputs.calibration_bundle_artifact }}
          CALIBRATION_RUN_ID: ${{ inputs.calibration_bundle_run_id }}
        run: |
          set -euo pipefail
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID")"
          producer_sha="$(jq -r '.head_sha' <<<"$run")"
          test "$(jq -r '.head_repository.full_name' <<<"$run")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.path' <<<"$run")" = ".github/workflows/packaged-platform-pr.yml"
          test "$(jq -r '.event' <<<"$run")" = workflow_dispatch
          test "$(jq -r '.conclusion' <<<"$run")" = success
          test "$CALIBRATION_ARTIFACT" = "embedding-calibration-bundle-$producer_sha"
          artifact_count="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID/artifacts?per_page=100" \
              | jq --arg name "$CALIBRATION_ARTIFACT" \
                '[.artifacts[] | select(.name == $name and .expired == false)] | length'
          )"
          test "$artifact_count" = 1

      - name: Download frozen calibration bundle
        if: ${{ !inputs.calibration_mode }}
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.calibration_bundle_artifact }}
          path: target/calibration-bundle
          run-id: ${{ inputs.calibration_bundle_run_id }}
          github-token: ${{ github.token }}

      - name: Prove cold and warm Metal, offline packaging, and multi-repository reuse
        if: ${{ !inputs.calibration_mode && !inputs.candidate_installed_only }}
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CODESTORY_EMBED_ALLOW_CPU: "0"
          SERVER_BEHAVIOR_ONLY: ${{ inputs.server_behavior_only }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          source_sha="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse 'HEAD^{tree}')"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          export TMPDIR="${RUNNER_TEMP}/codestory metal proof ü"
          mkdir -p "$TMPDIR"
          quality_args=()
          qualification_args=()
          claim_scope_args=()
          quality_path="target/release-quality-evidence/packet/packet-runtime-summary.json"
          if [ "$SERVER_BEHAVIOR_ONLY" = true ]; then
            claim_scope_args=(--server-behavior-only)
          else
            test -f "$quality_path"
            quality_args=(--retrieval-quality-evidence "$quality_path")
            qualification_args=(
              --produce-qualification-evidence
              --qualification-evidence target/macos-metal-proof/qualification.json
            )
          fi
          python3 .github/scripts/check-packaged-agent-proof.py \
            --archive "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
            --checksum-file "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz.sha256" \
            --expected-version "$version" \
            --project "${{ github.workspace }}" \
            --plugin-root plugins/codestory \
            --plugin-handoff \
            --engine-policy accelerated \
            --expected-backend Metal \
            --offline \
            --proof-tier protected_hardware \
            --qualification-matrix-cell protected_macos_arm64_metal \
            "${claim_scope_args[@]}" \
            "${qualification_args[@]}" \
            --calibration-bundle "$calibration_bundle" \
            --calibration-producer-run-id "${{ inputs.calibration_bundle_run_id }}" \
            --calibration-producer-artifact "${{ inputs.calibration_bundle_artifact }}" \
            --expected-source-sha "$source_sha" \
            --expected-source-tree "$source_tree" \
            "${quality_args[@]}" \
            --timeout-secs 1800 \
            --out-dir target/macos-metal-proof/packaged-agent

      - name: Collect three independent Metal calibration runs
        if: inputs.calibration_mode
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CODESTORY_EMBED_ALLOW_CPU: "0"
        run: |
          set -euo pipefail
          test "$(jq -r .status docs/testing/per-user-embedding-server-constant-set.json)" = unfrozen
          version="${VERSION#v}"
          source_sha="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse 'HEAD^{tree}')"
          export TMPDIR="${RUNNER_TEMP}/codestory metal calibration ü"
          mkdir -p "$TMPDIR" target/calibration-runs/macos
          for run_index in 1 2 3; do
            python3 .github/scripts/check-packaged-agent-proof.py \
              --archive "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
              --checksum-file "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz.sha256" \
              --expected-version "$version" \
              --project "${{ github.workspace }}" \
              --plugin-root plugins/codestory \
              --plugin-handoff \
              --engine-policy accelerated \
              --expected-backend Metal \
              --offline \
              --proof-tier calibration \
              --qualification-matrix-cell protected_macos_arm64_metal \
              --produce-qualification-evidence \
              --qualification-evidence "target/calibration-runs/macos/qualification-${run_index}.json" \
              --calibration-run-index "$run_index" \
              --calibration-run-output "target/calibration-runs/macos/run-${run_index}.json" \
              --expected-source-sha "$source_sha" \
              --expected-source-tree "$source_tree" \
              --timeout-secs 1800 \
              --out-dir "target/calibration-runs/macos/proof-${run_index}"
          done

      - name: Stage isolated candidate-managed macOS install
        if: ${{ inputs.candidate_installed_proof && !inputs.calibration_mode && (inputs.server_behavior_only || inputs.quality_evidence_artifact != '') }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          CANDIDATE_PRODUCER_WORKFLOW_PATH: ${{ inputs.candidate_producer_workflow_path }}
        run: |
          set -euo pipefail
          umask 077
          test -n "$CANDIDATE_PRODUCER_WORKFLOW_PATH"
          run_json="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")"
          test "$(jq -r .head_repository.full_name <<<"$run_json")" = "$GITHUB_REPOSITORY"
          test "$(jq -r .path <<<"$run_json")" = "$CANDIDATE_PRODUCER_WORKFLOW_PATH"
          test "$(jq -r .head_sha <<<"$run_json")" = "$(git rev-parse HEAD)"
          test "$(jq -r .run_attempt <<<"$run_json")" = "$GITHUB_RUN_ATTEMPT"
          version="${VERSION#v}"
          archive="target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz"
          candidate_root="$(mktemp -d "$RUNNER_TEMP/codestory-candidate-installed-macos.XXXXXX")"
          candidate_root="$(cd "$candidate_root" && pwd -P)"
          case "$candidate_root/" in
            "$GITHUB_WORKSPACE/"*)
              echo "::error::Candidate-managed root must be outside the source checkout."
              exit 1
              ;;
          esac
          echo "CODESTORY_CANDIDATE_MACOS_ROOT=$candidate_root" >> "$GITHUB_ENV"
          mkdir -p target/candidate-installed-macos
          python3 .github/scripts/check-packaged-agent-proof.py \
            --prepare-candidate-installed-proof \
            --archive "$archive" \
            --checksum-file "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz.sha256" \
            --expected-version "$version" \
            --plugin-root plugins/codestory \
            --candidate-plugin-root-output "$candidate_root/plugin" \
            --candidate-plugin-data-output "$candidate_root/data" \
            --installed-plugin-provenance-output target/candidate-installed-macos/provenance.json \
            --candidate-producer-repository "$GITHUB_REPOSITORY" \
            --candidate-producer-workflow-path "$CANDIDATE_PRODUCER_WORKFLOW_PATH" \
            --candidate-producer-run-id "$GITHUB_RUN_ID" \
            --candidate-producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --candidate-artifact-name "$(basename "$archive")"

      - name: Prove two-host candidate-installed macOS runtime
        if: ${{ inputs.candidate_installed_proof && !inputs.calibration_mode && (inputs.server_behavior_only || inputs.quality_evidence_artifact != '') }}
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CODESTORY_EMBED_ALLOW_CPU: "1"
          CANDIDATE_PRODUCER_WORKFLOW_PATH: ${{ inputs.candidate_producer_workflow_path }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          archive="target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          quality_path="target/release-quality-evidence/packet/packet-runtime-summary.json"
          source_sha="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse 'HEAD^{tree}')"
          claim_args=()
          if [ "${{ inputs.server_behavior_only }}" = true ]; then
            claim_args=(--ground-only)
          else
            test -f "$quality_path"
            claim_args=(
              --produce-qualification-evidence
              --qualification-evidence target/candidate-installed-macos/qualification.json
              --retrieval-quality-evidence "$quality_path"
            )
          fi
          python3 .github/scripts/check-packaged-agent-proof.py \
            --archive "$archive" \
            --checksum-file "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz.sha256" \
            --expected-version "$version" \
            --project "${{ github.workspace }}" \
            --plugin-root "$CODESTORY_CANDIDATE_MACOS_ROOT/plugin" \
            --plugin-handoff \
            --engine-policy cpu_explicit \
            --expected-backend CPU \
            --offline \
            --proof-tier installed_runtime \
            --qualification-matrix-cell candidate_installed_macos_arm64_cpu \
            "${claim_args[@]}" \
            --calibration-bundle "$calibration_bundle" \
            --calibration-producer-run-id "${{ inputs.calibration_bundle_run_id }}" \
            --calibration-producer-artifact "${{ inputs.calibration_bundle_artifact }}" \
            --installed-plugin-source candidate \
            --installed-plugin-provenance target/candidate-installed-macos/provenance.json \
            --installed-plugin-data "$CODESTORY_CANDIDATE_MACOS_ROOT/data" \
            --candidate-producer-repository "$GITHUB_REPOSITORY" \
            --candidate-producer-workflow-path "$CANDIDATE_PRODUCER_WORKFLOW_PATH" \
            --candidate-producer-run-id "$GITHUB_RUN_ID" \
            --candidate-producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --candidate-artifact-name "$(basename "$archive")" \
            --expected-source-sha "$source_sha" \
            --expected-source-tree "$source_tree" \
            --timeout-secs 1800 \
            --out-dir target/candidate-installed-macos/proof

      - name: Upload Metal calibration runs
        if: always() && inputs.calibration_mode
        uses: actions/upload-artifact@v7.0.1
        with:
          name: embedding-calibration-macos-${{ inputs.version }}
          path: target/calibration-runs/macos
          if-no-files-found: error
          retention-days: 30
          overwrite: true

      - name: Upload candidate-installed macOS proof
        if: always() && inputs.candidate_installed_proof && !inputs.calibration_mode && (inputs.server_behavior_only || inputs.quality_evidence_artifact != '')
        uses: actions/upload-artifact@v7.0.1
        with:
          name: candidate-installed-macos-${{ inputs.version }}-attempt-${{ github.run_attempt }}
          path: target/candidate-installed-macos
          if-no-files-found: error
          retention-days: 30

      - name: Emit authenticated Metal release cell
        if: inputs.emit_release_cells && !inputs.calibration_mode && !inputs.candidate_installed_only
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          jq -n \
            --arg native_engine coderank_q8_embedded \
            --arg calibration_sha256 "$(python3 -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$calibration_bundle")" \
            '{native_engine: $native_engine, calibration_sha256: $calibration_sha256}' \
            > target/macos-metal-proof/release-cell-identity.json
          node scripts/codestory-release-cell-manifest.mjs produce \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "${{ inputs.ref }}" \
            --version "$version" \
            --cell-id accelerator_execution:macos-arm64-metal \
            --producer-workflow .github/workflows/macos-metal-proof.yml \
            --producer-job packaged-metal \
            --producer-run-id "$GITHUB_RUN_ID" \
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --producer-artifact "release-cell-prepublish-macos-arm64-metal-attempt-$GITHUB_RUN_ATTEMPT" \
            --identity target/macos-metal-proof/release-cell-identity.json \
            --archive "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
            --out target/release-cells/accelerator_execution-macos-arm64-metal.json

      - name: Upload authenticated Metal release cell
        if: success() && inputs.emit_release_cells && !inputs.calibration_mode && !inputs.candidate_installed_only
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-cell-prepublish-macos-arm64-metal-attempt-${{ github.run_attempt }}
          path: target/release-cells/accelerator_execution-macos-arm64-metal.json
          if-no-files-found: error
          retention-days: 30

      - name: Emit authenticated candidate-installed macOS release cell
        if: inputs.emit_release_cells && inputs.candidate_installed_proof && !inputs.calibration_mode
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          calibration_bundle="$(find target/calibration-bundle -type f -name calibration-bundle.json -print)"
          test "$(printf '%s\n' "$calibration_bundle" | sed '/^$/d' | wc -l | tr -d ' ')" = 1
          jq -n \
            --arg installer candidate_managed_plugin \
            --arg runtime_version "$version" \
            --arg native_engine coderank_q8_embedded \
            --arg calibration_sha256 "$(python3 -c 'import hashlib,sys; print(hashlib.sha256(open(sys.argv[1], "rb").read()).hexdigest())' "$calibration_bundle")" \
            '{installer: $installer, runtime_version: $runtime_version, native_engine: $native_engine, calibration_sha256: $calibration_sha256}' \
            > target/candidate-installed-macos/release-cell-identity.json
          node scripts/codestory-release-cell-manifest.mjs produce \
            --repo "$GITHUB_WORKSPACE" \
            --expected-sha "${{ inputs.ref }}" \
            --version "$version" \
            --cell-id candidate_installed_behavior:macos-arm64 \
            --producer-workflow .github/workflows/macos-metal-proof.yml \
            --producer-job packaged-metal \
            --producer-run-id "$GITHUB_RUN_ID" \
            --producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --producer-artifact "release-cell-prepublish-candidate-installed-macos-arm64-attempt-$GITHUB_RUN_ATTEMPT" \
            --identity target/candidate-installed-macos/release-cell-identity.json \
            --archive "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
            --out target/release-cells/candidate_installed_behavior-macos-arm64.json

      - name: Upload authenticated candidate-installed macOS release cell
        if: success() && inputs.emit_release_cells && inputs.candidate_installed_proof && !inputs.calibration_mode
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-cell-prepublish-candidate-installed-macos-arm64-attempt-${{ github.run_attempt }}
          path: target/release-cells/candidate_installed_behavior-macos-arm64.json
          if-no-files-found: error
          retention-days: 30

      - name: Upload Metal proof artifacts
        if: always() && !inputs.calibration_mode
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-arm64-metal-proof-${{ inputs.version }}-attempt-${{ github.run_attempt }}
          path: target/macos-metal-proof
          if-no-files-found: error
          retention-days: 30
