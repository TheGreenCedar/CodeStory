name: macOS Apple Silicon Metal proof

on:
  workflow_call:
    inputs:
      version:
        description: CodeStory version to prove.
        required: true
        type: string
      ref:
        description: Git ref to check out. Defaults to the caller SHA.
        required: false
        type: string
      proof_key:
        description: Stable PR, integration, or release identity for cancellation.
        required: false
        default: ""
        type: string
      use_packaged_cli_artifact:
        description: Download the macOS arm64 package artifact produced by packaged-platform-proof.
        required: false
        default: false
        type: boolean
      quality_evidence_artifact:
        description: Exact-head release-evidence artifact containing packet/packet-runtime-summary.json.
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: CodeStory version to prove.
        required: true
        type: string
      ref:
        description: Git ref to check out. Defaults to the current SHA.
        required: false
        type: string
      proof_key:
        description: Stable proof identity for cancellation.
        required: false
        type: string
      quality_evidence_artifact:
        description: Existing exact-head release-evidence artifact name.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: macos-metal-proof-${{ inputs.proof_key || inputs.ref || github.ref }}
  cancel-in-progress: true

jobs:
  packaged-metal:
    name: Packaged Apple Silicon Metal engine
    runs-on: [self-hosted, macOS, ARM64, codestory-metal]
    # Configure this environment with release protection rules and restrict the
    # matching self-hosted runner/runner group to this evidence workflow.
    environment: macos-metal-release
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Capture host evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/macos-metal-proof
          {
            sw_vers
            uname -a
            uname -m
            sysctl -n machdep.cpu.brand_string
            xcode-select -p
            node --version
            python3 --version
          } > target/macos-metal-proof/host.txt 2>&1
          test "$(uname -m)" = arm64
          macos_major="$(sw_vers -productVersion | cut -d. -f1)"
          test "$macos_major" -ge 15

      - name: Install pinned Rust
        if: ${{ !inputs.use_packaged_cli_artifact }}
        shell: bash
        run: |
          rustup toolchain install 1.95.0 --profile minimal
          rustup default 1.95.0

      - name: Prepare checksum-pinned embedded model
        if: ${{ !inputs.use_packaged_cli_artifact }}
        run: node scripts/prepare-embedded-model.mjs

      - name: Build and package native CLI
        if: ${{ !inputs.use_packaged_cli_artifact }}
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          cargo build --release -p codestory-cli --locked
          python3 .github/scripts/package-codestory-release.py \
            --version "$version" \
            --target macos-arm64 \
            --binary target/release/codestory-cli \
            --out-dir target/release-dist

      - name: Download packaged CLI artifact
        if: inputs.use_packaged_cli_artifact
        uses: actions/download-artifact@v8.0.1
        with:
          name: codestory-cli-macos-arm64
          path: target/release-dist

      - name: Download exact-head publishable packet quality evidence
        if: inputs.quality_evidence_artifact != ''
        uses: actions/download-artifact@v8.0.1
        with:
          name: ${{ inputs.quality_evidence_artifact }}
          path: target/release-quality-evidence

      - name: Prove cold and warm Metal, offline packaging, and multi-repository reuse
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
          CODESTORY_EMBED_ALLOW_CPU: "0"
        run: |
          set -euo pipefail
          version="${VERSION#v}"
          source_sha="$(git rev-parse HEAD)"
          source_tree="$(git rev-parse 'HEAD^{tree}')"
          export TMPDIR="${RUNNER_TEMP}/codestory metal proof ü"
          mkdir -p "$TMPDIR"
          quality_args=()
          quality_path="target/release-quality-evidence/packet/packet-runtime-summary.json"
          if [ -f "$quality_path" ]; then
            quality_args=(--retrieval-quality-evidence "$quality_path")
          fi
          python3 .github/scripts/check-packaged-agent-proof.py \
            --archive "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz" \
            --checksum-file "target/release-dist/codestory-cli-v${version}-macos-arm64.tar.gz.sha256" \
            --expected-version "$version" \
            --project "${{ github.workspace }}" \
            --plugin-root plugins/codestory \
            --plugin-handoff \
            --engine-policy accelerated \
            --expected-backend Metal \
            --offline \
            --proof-tier protected_hardware \
            --qualification-matrix-cell protected_macos_arm64_metal \
            --produce-qualification-evidence \
            --qualification-evidence target/macos-metal-proof/qualification.json \
            --expected-source-sha "$source_sha" \
            --expected-source-tree "$source_tree" \
            "${quality_args[@]}" \
            --timeout-secs 1800 \
            --out-dir target/macos-metal-proof/packaged-agent

      - name: Upload Metal proof artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-arm64-metal-proof-${{ inputs.version }}
          path: target/macos-metal-proof
          if-no-files-found: error
          retention-days: 30
