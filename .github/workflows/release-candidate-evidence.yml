name: Release candidate evidence

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      proof_key:
        required: true
        type: string
      profile:
        required: true
        type: string
      drill_manifest:
        required: false
        type: string
        default: ""
      source_run_id:
        required: false
        type: string
        default: ""
    secrets:
      CODESTORY_RELEASE_EVIDENCE_APPROVAL_JSON:
        required: false

permissions:
  actions: read
  contents: read

concurrency:
  group: release-candidate-evidence-${{ inputs.proof_key }}
  cancel-in-progress: true

jobs:
  measure:
    name: Measure release candidate
    environment: release-evidence
    runs-on: [self-hosted, Linux, ARM64, codestory-release-evidence]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Record and validate runner provisioning
        if: inputs.source_run_id == ''
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          DRILL_MANIFEST: ${{ inputs.drill_manifest }}
        run: |
          set -euo pipefail
          test "$DRILL_MANIFEST" = /srv/codestory-release-evidence/drills/real-repo-drill-cases.json
          bash scripts/release-evidence/guest-verify.sh \
            scripts/release-evidence/machine-contract.json
          mkdir -p target/release-evidence
          cp /srv/codestory-release-evidence/artifacts/provisioning.json \
            target/release-evidence/provisioning.json
          provisioned_profile="$(jq -er 'select(.schema_version == 2) | .profile_id' \
            target/release-evidence/provisioning.json)"
          test "$PROFILE" = "$provisioned_profile" || {
            echo "::error::Requested profile $PROFILE does not match provisioned profile $provisioned_profile."
            exit 1
          }

      - name: Prepare checksum-pinned embedded model
        if: inputs.source_run_id == ''
        run: node scripts/prepare-embedded-model.mjs

      - name: Build release CLI
        if: inputs.source_run_id == ''
        run: cargo build --release --locked -p codestory-cli

      - name: Capture machine fingerprint
        if: inputs.source_run_id == ''
        id: machine
        shell: bash
        env:
          CODESTORY_RELEASE_EVIDENCE_PROVISIONING: ${{ github.workspace }}/target/release-evidence/provisioning.json
        run: echo "fingerprint=$(node scripts/codestory-release-evidence-gate.mjs fingerprint)" >> "$GITHUB_OUTPUT"

      - name: Produce full-retrieval repo evidence
        if: inputs.source_run_id == ''
        shell: bash
        env:
          CODESTORY_RELEASE_EVIDENCE_DRILL_OUTPUT_DIR: ${{ github.workspace }}/target/release-evidence/drill
          CODESTORY_RELEASE_EVIDENCE_STATS_PATH: ${{ github.workspace }}/target/release-evidence/stats.json
          CODESTORY_RELEASE_EVIDENCE_COMMIT: ${{ inputs.ref }}
          CODESTORY_RELEASE_EVIDENCE_CORPUS_ID: codestory-release-corpus-v0.16-axios-js-ts-v1
          CODESTORY_RELEASE_EVIDENCE_CACHE_ID: cold-inprocess-v1
          CODESTORY_RELEASE_EVIDENCE_MACHINE_FINGERPRINT: ${{ steps.machine.outputs.fingerprint }}
          CODESTORY_REAL_REPO_DRILL_CASES: ${{ inputs.drill_manifest }}
          CODESTORY_EMBED_ALLOW_CPU: "1"
        run: |
          set -euo pipefail
          cargo test --locked -p codestory-cli --test codestory_repo_e2e_stats -- --ignored --nocapture --test-threads=1 \
            2>&1 | tee target/release-evidence/repo-e2e-output.txt

      - name: Produce publishable packet evidence
        if: inputs.source_run_id == ''
        shell: bash
        env:
          CODESTORY_RELEASE_EVIDENCE_COMMIT: ${{ inputs.ref }}
          CODESTORY_RELEASE_EVIDENCE_PROFILE: ${{ inputs.profile }}
          CODESTORY_RELEASE_EVIDENCE_CORPUS_ID: codestory-release-corpus-v0.16-axios-js-ts-v1
          CODESTORY_RELEASE_EVIDENCE_CORPUS_CONTRACT: benchmarks/release-evidence/corpus-contracts/v0.16-axios-js-ts-v1.json
          CODESTORY_RELEASE_EVIDENCE_CACHE_ID: cold-inprocess-v1
          CODESTORY_RELEASE_EVIDENCE_MACHINE_FINGERPRINT: ${{ steps.machine.outputs.fingerprint }}
          CODESTORY_EMBED_ALLOW_CPU: "1"
        run: |
          set -euo pipefail
          node scripts/codestory-agent-ab-benchmark.mjs \
            --packet-runtime \
            --packet-runtime-mode cold-cli \
            --task-suite holdout-retrieval \
            --task-ids axios-request-dispatch \
            --materialize-repos \
            --repeats 3 \
            --publishable \
            --max-source-reads-after-packet 0 \
            --codestory-cli target/release/codestory-cli \
            --timeout-ms 180000 \
            --out-dir target/release-evidence/packet

      - name: Download prior rejected evidence for approval re-evaluation
        if: inputs.source_run_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVIDENCE_SHA: ${{ inputs.ref }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          mkdir -p target/release-evidence
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID" \
            > target/release-evidence/source-run.json
          gh api "repos/$GITHUB_REPOSITORY/actions/runs/$SOURCE_RUN_ID/artifacts" \
            > target/release-evidence/source-run-artifacts.json
          node scripts/codestory-release-evidence-gate.mjs validate-source-run \
            --run target/release-evidence/source-run.json \
            --artifacts target/release-evidence/source-run-artifacts.json \
            --repo "$GITHUB_REPOSITORY" \
            --expected-sha "$EVIDENCE_SHA"
          gh run download "$SOURCE_RUN_ID" \
            --repo "$GITHUB_REPOSITORY" \
            --name "release-evidence-$EVIDENCE_SHA" \
            --dir target/release-evidence

      - name: Produce and evaluate same-SHA candidate
        shell: bash
        env:
          PROFILE: ${{ inputs.profile }}
          APPROVAL_JSON: ${{ secrets.CODESTORY_RELEASE_EVIDENCE_APPROVAL_JSON }}
          EVIDENCE_SHA: ${{ inputs.ref }}
          PROOF_KEY: ${{ inputs.proof_key }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
        run: |
          set -euo pipefail
          if [ -n "$SOURCE_RUN_ID" ] && [ -z "$APPROVAL_JSON" ]; then
            echo "::error::Protected release-evidence approval is required for source-run re-evaluation."
            exit 1
          fi
          if [ -z "$SOURCE_RUN_ID" ]; then
            node scripts/codestory-release-evidence-gate.mjs produce \
              --baseline benchmarks/release-evidence/approved-baselines.json \
              --profile "$PROFILE" \
              --stats target/release-evidence/stats.json \
              --packet target/release-evidence/packet/packet-runtime-summary.json \
              --out target/release-evidence/candidate.json \
              --expected-sha "$EVIDENCE_SHA" \
              --release-key "$PROOF_KEY" \
              --mode release \
              --repo "$GITHUB_WORKSPACE"
          fi
          approval_args=()
          if [ -n "$APPROVAL_JSON" ]; then
            printf '%s' "$APPROVAL_JSON" > target/release-evidence/approval.json
            approval_args=(--approval target/release-evidence/approval.json)
          fi
          node scripts/codestory-release-evidence-gate.mjs evaluate \
            --baseline benchmarks/release-evidence/approved-baselines.json \
            --candidate target/release-evidence/candidate.json \
            --out target/release-evidence/report.json \
            --expected-sha "$EVIDENCE_SHA" \
            --release-key "$PROOF_KEY" \
            --mode release \
            --repo "$GITHUB_WORKSPACE" \
            "${approval_args[@]}"

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-evidence-${{ inputs.ref }}
          path: target/release-evidence
          if-no-files-found: warn
          retention-days: 30
