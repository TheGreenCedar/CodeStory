name: Platform and integration proof

on:
  pull_request:
    types: [labeled, synchronize]
  workflow_dispatch:
    inputs:
      mode:
        description: Prove an accepted PR head, collect pre-freeze calibration, run release evidence, or prove current dev.
        required: true
        default: platform
        type: choice
        options: [platform, calibration, release-evidence, integration]
      pr_number:
        description: Same-repository pull request for platform mode.
        required: false
        type: string
      expected_head_sha:
        description: Exact accepted head SHA.
        required: true
        type: string
      scope:
        description: Auto-detect proof scope or select a coordinator package scope; server excludes Windows runtime proof.
        required: true
        default: auto
        type: choice
        options: [auto, server, windows, macos, full]
      source_run_id:
        description: Optional prior rejected release-evidence run to re-evaluate.
        required: false
        type: string
      calibration_bundle_artifact:
        description: Frozen calibration bundle artifact name.
        required: false
        type: string
      calibration_bundle_run_id:
        description: Workflow run that produced the frozen calibration bundle artifact.
        required: false
        type: string

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: proof-${{ inputs.mode || 'platform' }}-${{ inputs.pr_number || github.event.pull_request.number || 'dev' }}-${{ github.event.action == 'labeled' && github.event.label.name != 'platform-proof' && github.event.label.name || 'candidate' }}
  cancel-in-progress: true

jobs:
  route:
    if: github.event_name != 'pull_request' || (github.event.action == 'labeled' && github.event.label.name == 'platform-proof')
    runs-on: ubuntu-latest
    outputs:
      head_sha: ${{ steps.resolve.outputs.head_sha }}
      base_sha: ${{ steps.resolve.outputs.base_sha }}
      mode: ${{ steps.resolve.outputs.mode }}
      proof_key: ${{ steps.resolve.outputs.proof_key }}
      scope: ${{ steps.scope.outputs.scope }}
      version: ${{ steps.version.outputs.version }}
      constants_frozen: ${{ steps.constants.outputs.frozen }}
      freeze_transition: ${{ steps.constants.outputs.freeze_transition }}
    steps:
      - name: Resolve trusted exact head
        id: resolve
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ inputs.pr_number }}
          INPUT_HEAD_SHA: ${{ inputs.expected_head_sha }}
          INPUT_MODE: ${{ inputs.mode }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          EVENT_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          INPUT_SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          INPUT_CALIBRATION_ARTIFACT: ${{ inputs.calibration_bundle_artifact }}
          INPUT_CALIBRATION_RUN_ID: ${{ inputs.calibration_bundle_run_id }}
        run: |
          set -euo pipefail
          mode="${INPUT_MODE:-platform}"
          if [ "$mode" = "integration" ]; then
            test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
            test -n "$INPUT_HEAD_SHA"
            dev_head="$(gh api "repos/$GITHUB_REPOSITORY/branches/dev/codestory-next" --jq '.commit.sha')"
            test "$INPUT_HEAD_SHA" = "$dev_head" || {
              echo "::error::Integration proof requires current dev head $dev_head, not $INPUT_HEAD_SHA."
              exit 1
            }
            {
              echo "head_sha=$dev_head"
              echo "base_sha="
              echo "mode=integration"
              echo "proof_key=integration-$dev_head"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test "$mode" = "platform" || test "$mode" = "calibration" || test "$mode" = "release-evidence"
          pr_number="${EVENT_PR_NUMBER:-$INPUT_PR_NUMBER}"
          expected_head="${EVENT_HEAD_SHA:-$INPUT_HEAD_SHA}"
          test -n "$pr_number" && test -n "$expected_head"
          pr="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$pr_number")"
          head_repo="$(jq -r '.head.repo.full_name' <<<"$pr")"
          current_head="$(jq -r '.head.sha' <<<"$pr")"
          base_sha="$(jq -r '.base.sha' <<<"$pr")"
          base_ref="$(jq -r '.base.ref' <<<"$pr")"
          test "$head_repo" = "$GITHUB_REPOSITORY" || {
            echo "::error::Platform proof does not execute fork pull requests."
            exit 1
          }
          if [ -n "$EVENT_HEAD_REPO" ]; then
            test "$EVENT_HEAD_REPO" = "$GITHUB_REPOSITORY" || exit 1
          fi
          test "$current_head" = "$expected_head" || {
            echo "::error::PR #$pr_number moved from promoted head $expected_head to $current_head."
            exit 1
          }
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            test "$GITHUB_SHA" = "$current_head" || {
              echo "::error::Workflow ref $GITHUB_SHA is not exact PR head $current_head."
              exit 1
            }
          fi
          if [ "$mode" = "release-evidence" ] || [ "$mode" = "calibration" ]; then
            test "$GITHUB_EVENT_NAME" = "workflow_dispatch"
            test "$base_ref" = "dev/codestory-next" || {
              echo "::error::$mode requires a PR into dev/codestory-next, not $base_ref."
              exit 1
            }
            jq -e 'any(.labels[]; .name == "review-accepted")' <<<"$pr" >/dev/null || {
              echo "::error::PR #$pr_number does not carry the review-accepted label."
              exit 1
            }
          fi
          if [ "$mode" = "calibration" ]; then
            if [ -n "$INPUT_SOURCE_RUN_ID" ] \
              || [ -n "$INPUT_CALIBRATION_ARTIFACT" ] \
              || [ -n "$INPUT_CALIBRATION_RUN_ID" ]; then
              echo "::error::Calibration collection does not consume prior proof artifacts."
              exit 1
            fi
          fi
          {
            echo "head_sha=$current_head"
            echo "base_sha=$base_sha"
            echo "mode=$mode"
            echo "proof_key=$mode-pr-$pr_number-$current_head"
          } >> "$GITHUB_OUTPUT"

      - name: Require successful exact-head source proof
        if: steps.resolve.outputs.mode != 'integration'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
        run: |
          set -euo pipefail
          accepted=false
          while IFS= read -r run_id; do
            if gh api "repos/$GITHUB_REPOSITORY/actions/runs/$run_id/jobs?per_page=100" \
              --jq '.jobs[] | select(.name == "full-source-gate" and .conclusion == "success") | .id' \
              | grep -q .
            then
              accepted=true
              echo "Accepted exact-head source proof run $run_id for $HEAD_SHA."
              break
            fi
          done < <(
            gh api --paginate \
              "repos/$GITHUB_REPOSITORY/actions/runs?head_sha=$HEAD_SHA&status=completed&per_page=100" \
              | jq -r --arg repo "$GITHUB_REPOSITORY" \
                '.workflow_runs[] | select(.path == ".github/workflows/source-proof.yml" and .head_repository.full_name == $repo and (.event == "pull_request" or .event == "workflow_dispatch") and .conclusion == "success") | .id'
          )
          test "$accepted" = true || {
            echo "::error::No successful full-source-gate job exists for exact head $HEAD_SHA."
            exit 1
          }

      - name: Authenticate calibration bundle producer
        if: inputs.calibration_bundle_artifact != '' || inputs.calibration_bundle_run_id != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CALIBRATION_ARTIFACT: ${{ inputs.calibration_bundle_artifact }}
          CALIBRATION_RUN_ID: ${{ inputs.calibration_bundle_run_id }}
        run: |
          set -euo pipefail
          test -n "$CALIBRATION_ARTIFACT" && test -n "$CALIBRATION_RUN_ID"
          run="$(gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID")"
          producer_sha="$(jq -r '.head_sha' <<<"$run")"
          test "$(jq -r '.head_repository.full_name' <<<"$run")" = "$GITHUB_REPOSITORY"
          test "$(jq -r '.path' <<<"$run")" = ".github/workflows/packaged-platform-pr.yml"
          test "$(jq -r '.event' <<<"$run")" = workflow_dispatch
          test "$(jq -r '.conclusion' <<<"$run")" = success
          test "$CALIBRATION_ARTIFACT" = "embedding-calibration-bundle-$producer_sha"
          artifact_count="$(
            gh api "repos/$GITHUB_REPOSITORY/actions/runs/$CALIBRATION_RUN_ID/artifacts?per_page=100" \
              | jq --arg name "$CALIBRATION_ARTIFACT" \
                '[.artifacts[] | select(.name == $name and .expired == false)] | length'
          )"
          test "$artifact_count" = 1

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.resolve.outputs.head_sha }}
          fetch-depth: 0

      - name: Select change-aware proof scope
        id: scope
        shell: bash
        env:
          BASE_SHA: ${{ steps.resolve.outputs.base_sha }}
          HEAD_SHA: ${{ steps.resolve.outputs.head_sha }}
          REQUESTED_SCOPE: ${{ inputs.scope || 'auto' }}
        run: |
          set -euo pipefail
          if [ "${{ steps.resolve.outputs.mode }}" = "integration" ]; then
            scope=full
          elif [ "${{ steps.resolve.outputs.mode }}" = "calibration" ]; then
            scope=none
          elif [ "${{ steps.resolve.outputs.mode }}" = "release-evidence" ]; then
            scope=none
          elif [ "$REQUESTED_SCOPE" = "server" ]; then
            scope=server
          else
            scope="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" | node .github/scripts/route-ci-proof.mjs --stdin --requested "$REQUESTED_SCOPE")"
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Selected $scope platform proof."

      - name: Read qualification constant-set state
        id: constants
        shell: bash
        env:
          BASE_SHA: ${{ steps.resolve.outputs.base_sha }}
        run: |
          constant_set_path=docs/testing/per-user-embedding-server-constant-set.json
          frozen="$(jq -r '.status == "frozen"' "$constant_set_path")"
          test "$frozen" = true || test "$frozen" = false
          base_frozen=false
          if [ -n "$BASE_SHA" ] \
            && git cat-file -e "$BASE_SHA:$constant_set_path" 2>/dev/null; then
            base_frozen="$(git show "$BASE_SHA:$constant_set_path" \
              | jq -r '.status == "frozen"')"
          fi
          test "$base_frozen" = true || test "$base_frozen" = false
          freeze_transition=false
          if [ -n "$BASE_SHA" ] \
            && [ "$base_frozen" = false ] \
            && [ "$frozen" = true ]; then
            freeze_transition=true
          fi
          echo "frozen=$frozen" >> "$GITHUB_OUTPUT"
          echo "freeze_transition=$freeze_transition" >> "$GITHUB_OUTPUT"

      - name: Verify package version surfaces
        if: steps.resolve.outputs.mode != 'release-evidence'
        id: version
        shell: bash
        run: |
          version="$(python -c "import tomllib; print(tomllib.load(open('crates/codestory-cli/Cargo.toml', 'rb'))['package']['version'])")"
          python .github/scripts/check-codestory-release.py --version "$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  calibration-linux:
    if: needs.route.outputs.mode == 'calibration'
    needs: route
    uses: ./.github/workflows/packaged-platform-proof.yml
    with:
      version: ${{ needs.route.outputs.version }}
      ref: ${{ needs.route.outputs.head_sha }}
      scope: full
      proof_key: calibration-linux-${{ needs.route.outputs.head_sha }}
      calibration_mode: true

  calibration-macos:
    if: needs.route.outputs.mode == 'calibration'
    needs: route
    uses: ./.github/workflows/macos-metal-proof.yml
    with:
      version: ${{ needs.route.outputs.version }}
      ref: ${{ needs.route.outputs.head_sha }}
      proof_key: calibration-macos-${{ needs.route.outputs.head_sha }}
      use_packaged_cli_artifact: false
      calibration_mode: true

  calibration-assemble:
    if: >-
      always() &&
      needs.route.result == 'success' &&
      needs.route.outputs.mode == 'calibration' &&
      needs.calibration-linux.result == 'success' &&
      needs.calibration-macos.result == 'success'
    needs:
      - route
      - calibration-linux
      - calibration-macos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact calibration head
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.route.outputs.head_sha }}
          fetch-depth: 0

      - name: Download hosted Linux calibration runs
        uses: actions/download-artifact@v8.0.1
        with:
          name: embedding-calibration-linux-${{ needs.route.outputs.version }}
          path: target/calibration-inputs/linux

      - name: Download protected macOS calibration runs
        uses: actions/download-artifact@v8.0.1
        with:
          name: embedding-calibration-macos-${{ needs.route.outputs.version }}
          path: target/calibration-inputs/macos

      - name: Assemble frozen calibration candidate
        shell: bash
        env:
          EXPECTED_HEAD_SHA: ${{ needs.route.outputs.head_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"
          mapfile -t runs < <(
            find target/calibration-inputs -type f \
              \( -name 'run-1.json' -o -name 'run-2.json' -o -name 'run-3.json' \) \
              -print | sort
          )
          test "${#runs[@]}" = 6
          run_args=()
          for run in "${runs[@]}"; do
            run_args+=(--calibration-run "$run")
          done
          mkdir -p target/calibration-freeze
          python .github/scripts/check-packaged-agent-proof.py \
            --assemble-calibration-bundle \
            "${run_args[@]}" \
            --calibration-bundle-output target/calibration-freeze/calibration-bundle.json \
            --frozen-constant-set-output target/calibration-freeze/per-user-embedding-server-constant-set.json \
            --freeze-selected-at "github-actions-run:${GITHUB_RUN_ID}:${GITHUB_RUN_ATTEMPT}" \
            --calibration-producer-repository "$GITHUB_REPOSITORY" \
            --calibration-producer-workflow-path ".github/workflows/packaged-platform-pr.yml" \
            --calibration-producer-run-id "$GITHUB_RUN_ID" \
            --calibration-producer-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --calibration-producer-artifact "embedding-calibration-bundle-${EXPECTED_HEAD_SHA}" \
            > target/calibration-freeze/assembly.json
          jq \
            --arg source_head_sha "$EXPECTED_HEAD_SHA" \
            --arg source_tree "$(git rev-parse 'HEAD^{tree}')" \
            --arg producer_run_id "$GITHUB_RUN_ID" \
            --arg producer_run_attempt "$GITHUB_RUN_ATTEMPT" \
            '. + {
              source_head_sha: $source_head_sha,
              source_tree: $source_tree,
              producer_run_id: $producer_run_id,
              producer_run_attempt: $producer_run_attempt
            }' \
            target/calibration-freeze/assembly.json \
            > target/calibration-freeze/manifest.json
          jq -e \
            --arg source_head_sha "$EXPECTED_HEAD_SHA" \
            --arg producer_run_id "$GITHUB_RUN_ID" \
            '.selection_source.commit == $source_head_sha
             and .run_count == 6
             and .matrix_cell_count == 2
             and .producer_run_id == $producer_run_id' \
            target/calibration-freeze/manifest.json >/dev/null

      - name: Upload calibration bundle and frozen constant candidate
        uses: actions/upload-artifact@v7.0.1
        with:
          name: embedding-calibration-bundle-${{ needs.route.outputs.head_sha }}
          path: target/calibration-freeze
          if-no-files-found: error
          retention-days: 30

  macos-source:
    if: needs.route.outputs.scope == 'macos'
    needs: route
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            target: aarch64-apple-darwin
          - os: macos-15-intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.route.outputs.head_sha }}
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Capture Rust cache identity
        id: rust-cache-key
        shell: bash
        run: |
          echo "version=$(rustc -Vv | sed -n 's/^release: //p')" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-macos-source-${{ steps.rust-cache-key.outputs.version }}-${{ matrix.target }}-workspace-default-features-${{ hashFiles('Cargo.lock') }}
      - run: cargo check --workspace --locked
      - run: node --test scripts/tests/codex-worktree-setup.test.mjs
      - run: test -x plugins/codestory/skills/codestory-grounding/scripts/setup.sh

  repo-scale-stats:
    if: needs.route.outputs.mode != 'release-evidence' && needs.route.outputs.mode != 'calibration'
    needs: route
    uses: ./.github/workflows/repo-scale-stats.yml
    with:
      ref: ${{ needs.route.outputs.head_sha }}
      proof_key: ${{ needs.route.outputs.proof_key }}

  release-evidence:
    if: >-
      needs.route.outputs.mode == 'release-evidence' ||
      (needs.route.outputs.mode != 'calibration' &&
       needs.route.outputs.scope != 'server' &&
       needs.route.outputs.constants_frozen == 'true')
    needs: route
    uses: ./.github/workflows/release-candidate-evidence.yml
    with:
      ref: ${{ needs.route.outputs.head_sha }}
      proof_key: ${{ needs.route.outputs.proof_key }}
      profile: codestory-release-evidence-linux-arm64-v2
      drill_manifest: /srv/codestory-release-evidence/drills/real-repo-drill-cases.json
      source_run_id: ${{ inputs.source_run_id }}

  source-proof:
    if: needs.route.outputs.mode == 'integration'
    needs: route
    uses: ./.github/workflows/source-proof.yml
    with:
      ref: ${{ needs.route.outputs.head_sha }}
      proof_key: ${{ needs.route.outputs.proof_key }}

  packaged-proof:
    if: >-
      always() &&
      needs.route.result == 'success' &&
      needs.route.outputs.scope != 'none' &&
      (needs.macos-source.result == 'success' || needs.macos-source.result == 'skipped') &&
      (needs.source-proof.result == 'success' || (needs.route.outputs.mode == 'platform' && needs.source-proof.result == 'skipped')) &&
      (needs.release-evidence.result == 'success' ||
       ((needs.route.outputs.constants_frozen != 'true' ||
         needs.route.outputs.scope == 'server') &&
        needs.release-evidence.result == 'skipped'))
    needs:
      - route
      - macos-source
      - release-evidence
      - source-proof
    uses: ./.github/workflows/packaged-platform-proof.yml
    with:
      version: ${{ needs.route.outputs.version }}
      ref: ${{ needs.route.outputs.head_sha }}
      scope: ${{ needs.route.outputs.scope }}
      proof_key: ${{ needs.route.outputs.proof_key }}
      sign_macos: false
      quality_evidence_artifact: ${{ needs.release-evidence.result == 'success' && format('release-evidence-{0}', needs.route.outputs.head_sha) || '' }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact || '' }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id || '' }}
      enforce_calibration_freeze_lineage: ${{ needs.route.outputs.freeze_transition == 'true' }}
      candidate_installed_proof: true

  macos-metal-proof:
    if: >-
      always() &&
      needs.route.result == 'success' &&
      needs.packaged-proof.result == 'success' &&
      (needs.route.outputs.scope == 'macos' || needs.route.outputs.scope == 'server' || needs.route.outputs.scope == 'full')
    needs:
      - route
      - packaged-proof
      - release-evidence
    uses: ./.github/workflows/macos-metal-proof.yml
    with:
      version: ${{ needs.route.outputs.version }}
      ref: ${{ needs.route.outputs.head_sha }}
      proof_key: ${{ needs.route.outputs.proof_key }}
      use_packaged_cli_artifact: true
      quality_evidence_artifact: ${{ needs.release-evidence.result == 'success' && format('release-evidence-{0}', needs.route.outputs.head_sha) || '' }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact || '' }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id || '' }}
      candidate_installed_proof: true
      server_behavior_only: ${{ needs.route.outputs.scope == 'server' }}

  windows-vulkan-proof:
    if: >-
      always() &&
      needs.route.result == 'success' &&
      needs.packaged-proof.result == 'success' &&
      (needs.route.outputs.scope == 'windows' || needs.route.outputs.scope == 'full')
    needs:
      - route
      - packaged-proof
      - release-evidence
    uses: ./.github/workflows/windows-vulkan-proof.yml
    with:
      version: ${{ needs.route.outputs.version }}
      ref: ${{ needs.route.outputs.head_sha }}
      proof_key: ${{ needs.route.outputs.proof_key }}
      use_packaged_cli_artifact: true
      quality_evidence_artifact: ${{ needs.route.outputs.constants_frozen == 'true' && format('release-evidence-{0}', needs.route.outputs.head_sha) || '' }}
      calibration_bundle_artifact: ${{ inputs.calibration_bundle_artifact || '' }}
      calibration_bundle_run_id: ${{ inputs.calibration_bundle_run_id || '' }}

  closeout:
    if: >-
      always() &&
      needs.route.result != 'skipped' &&
      needs.route.outputs.mode != 'release-evidence' &&
      needs.route.outputs.mode != 'calibration'
    needs:
      - route
      - macos-source
      - source-proof
      - repo-scale-stats
      - release-evidence
      - packaged-proof
      - macos-metal-proof
      - windows-vulkan-proof
    runs-on: ubuntu-latest
    steps:
      - name: Require one coherent accepted proof
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.route.outputs.head_sha }}
          MODE: ${{ needs.route.outputs.mode }}
          SCOPE: ${{ needs.route.outputs.scope }}
          ROUTE_RESULT: ${{ needs.route.result }}
          MACOS_SOURCE_RESULT: ${{ needs.macos-source.result }}
          SOURCE_RESULT: ${{ needs.source-proof.result }}
          STATS_RESULT: ${{ needs.repo-scale-stats.result }}
          EVIDENCE_RESULT: ${{ needs.release-evidence.result }}
          CONSTANTS_FROZEN: ${{ needs.route.outputs.constants_frozen }}
          PACKAGE_RESULT: ${{ needs.packaged-proof.result }}
          METAL_RESULT: ${{ needs.macos-metal-proof.result }}
          VULKAN_RESULT: ${{ needs.windows-vulkan-proof.result }}
        run: |
          set -euo pipefail
          require_result() {
            test "$1" = "$2" || {
              echo "::error::$3 finished $1; expected $2."
              exit 1
            }
          }
          require_result "$ROUTE_RESULT" success routing
          require_result "$STATS_RESULT" success repo-scale-stats
          if [ "$CONSTANTS_FROZEN" = true ] && [ "$SCOPE" != server ]; then
            require_result "$EVIDENCE_RESULT" success release-evidence
          else
            require_result "$EVIDENCE_RESULT" skipped release-evidence
          fi
          if [ "$MODE" = integration ]; then
            require_result "$SOURCE_RESULT" success source-proof
          else
            require_result "$SOURCE_RESULT" skipped source-proof
          fi
          if [ "$SCOPE" = macos ]; then
            require_result "$MACOS_SOURCE_RESULT" success macos-source
          else
            require_result "$MACOS_SOURCE_RESULT" skipped macos-source
          fi
          if [ "$SCOPE" = none ]; then
            require_result "$PACKAGE_RESULT" skipped packaged-proof
            require_result "$METAL_RESULT" skipped macos-metal-proof
            require_result "$VULKAN_RESULT" skipped windows-vulkan-proof
          else
            require_result "$PACKAGE_RESULT" success packaged-proof
            if [ "$SCOPE" = windows ]; then
              require_result "$METAL_RESULT" skipped macos-metal-proof
              require_result "$VULKAN_RESULT" success windows-vulkan-proof
            elif [ "$SCOPE" = macos ]; then
              require_result "$METAL_RESULT" success macos-metal-proof
              require_result "$VULKAN_RESULT" skipped windows-vulkan-proof
            elif [ "$SCOPE" = server ]; then
              require_result "$METAL_RESULT" success macos-metal-proof
              require_result "$VULKAN_RESULT" skipped windows-vulkan-proof
            else
              require_result "$METAL_RESULT" success macos-metal-proof
              require_result "$VULKAN_RESULT" success windows-vulkan-proof
            fi
          fi
          if [ "$MODE" = integration ]; then
            current_dev="$(gh api "repos/$GITHUB_REPOSITORY/branches/dev/codestory-next" --jq '.commit.sha')"
            test "$HEAD_SHA" = "$current_dev" || {
              echo "::error::dev/codestory-next moved from proved head $HEAD_SHA to $current_dev."
              exit 1
            }
          fi
